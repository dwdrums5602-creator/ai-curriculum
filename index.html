      { id:"2.2", title:"Role-Setting Done Right",
        summary:`## What Role-Setting Actually Does\n\nYou already know that a system prompt defines the AI's persona. Role-setting is the specific technique within that — the art of assigning the AI an identity that shapes every response it gives.\n\nWhen you assign a role, you are not just giving the AI a job title. You are activating a specific lens through which it interprets your request, selects vocabulary, calibrates formality, and determines what counts as a good answer. The same question asked to "an AI assistant" versus "a senior private wealth advisor with 25 years of client experience" will produce dramatically different outputs — even with identical follow-up questions.\n\nThink of it as setting the tuning of an instrument before you play it. The notes are the same, but the sound is entirely different.\n\n---\n\n## Weak Role-Setting vs. Strong Role-Setting\n\nMost people who know about role-setting use it weakly. They write "You are a helpful assistant" or "You are an expert in marketing." These are better than nothing, but they are far from precise.\n\nStrong role-setting has three layers:\n\n**Layer 1 — The Title**\nWhat is the role, specifically? Not "a financial expert" but "a fee-only fiduciary financial planner who works exclusively with clients in the $5M–$50M net worth range."\n\n**Layer 2 — The Experience and Perspective**\nHow long have they been doing this? What have they seen? What do they believe? "You have 20 years of experience and have guided clients through the 2008 financial crisis, the 2020 pandemic crash, and multiple market cycles. You believe strongly in behavioral finance and the psychological side of wealth management."\n\n**Layer 3 — The Audience Relationship**\nWho is this person talking to, and how? "You communicate with clients in plain, confident language. You never use jargon without immediately explaining it. You treat clients as intelligent adults who simply lack your specialized knowledge."\n\nCombined, these three layers produce a role that genuinely shapes the AI's outputs in useful, specific ways.\n\n---\n\n## Role-Setting for Different Client Situations\n\nAs a consultant, you will build custom roles for every client tool you create. Here are examples across different use cases:\n\n**For a HNW family office:**\n"You are a discreet, highly professional personal assistant to a family office managing significant multigenerational wealth. You communicate with the formality of a private bank, the discretion of a personal attorney, and the warmth of a trusted advisor. You never speculate, never offer opinions on specific investments, and always recommend professional consultation for any decision with legal or financial implications."\n\n**For a boutique law firm:**\n"You are a senior paralegal with 15 years of experience at a boutique firm specializing in estate planning and trust administration. You write with legal precision but translate complex concepts into plain English for clients. You always flag when a question requires attorney review rather than answering it directly."\n\n**For a luxury real estate agency:**\n"You are a seasoned luxury property specialist with deep knowledge of the ultra-high-end residential market. You write property descriptions that evoke lifestyle and aspiration without resorting to clichés. You never use the words 'stunning,' 'breathtaking,' or 'cozy.' Your tone is confident and understated — never breathless."\n\nNotice that each role includes not just what the AI is, but how it communicates, what it avoids, and where its limits are.\n\n---\n\n## Role-Setting in System Prompts vs. User Prompts\n\nRole-setting works in both places, but with different implications:\n\n**In a system prompt:** The role is permanent for that Project or tool. Every conversation starts from that identity. This is how you build branded client tools — the AI is always "your" assistant, not a generic chatbot.\n\n**In a user prompt:** The role is temporary, applying only to that specific request. Useful for one-off tasks where you need a specific perspective without changing your overall setup.\n\nFor consulting work, system prompt role-setting is almost always what you want. It is the difference between a tool and a conversation.\n\n---\n\n## The Consistency Test\n\nHow do you know if your role-setting is working? Apply the consistency test: ask the same question three different ways and see if the voice, vocabulary, and perspective remain consistent across all three answers. If it does, your role is well-defined. If the AI drifts back to generic assistant behavior, your role description needs more specificity in layers 2 and 3.\n\n**Your tool right now:** Open Claude Projects and create a new Project. Write a three-layer role in the Project Instructions for a hypothetical HNW client assistant — title, experience/perspective, and audience relationship. Then have three different conversations inside that Project and see if the persona holds consistently. This is your first real system prompt build.`,
        quiz:[
          { q:"What are the three layers of strong role-setting?", opts:["Name, age, and location of the AI persona","Title, experience and perspective, and audience relationship","Role, context, and task","System prompt, user prompt, and output format"], a:1 },
          { q:"Why does 'You are a helpful assistant' produce weaker results than a detailed role description?", opts:["It is too short for the AI to process properly","It lacks specificity — without layers of experience, perspective, and communication style, the AI defaults to generic behavior","Helpful assistants are a restricted role type in Claude","Short role descriptions reduce the model's context window efficiency"], a:1 },
          { q:"You build a Claude Project for a HNW client and after two conversations the AI starts responding like a generic chatbot instead of the defined persona. What is the most likely fix?", opts:["Switch to a different Claude model","The role description in the system prompt needs more specificity in layers 2 and 3 — experience, beliefs, and communication style","Delete the Project and start over","Add more user prompt context at the start of each conversation"], a:1 },
          { q:"What is the key difference between role-setting in a system prompt versus a user prompt?", opts:["System prompts use formal language, user prompts use casual language","System prompt roles are permanent for the entire Project — user prompt roles are temporary for that single request only","User prompts produce better role-setting results than system prompts","There is no meaningful difference between the two approaches"], a:1 },
          { q:"A client wants an AI tool that always sounds like their brand — never generic, never off-voice. Where should the role definition live?", opts:["In every user prompt, repeated at the start of each conversation","In the system prompt of a Claude Project — making the role permanent across all conversations automatically","In a separate document the user pastes in when needed","Role definitions cannot produce consistent brand voice — human editors are always required"], a:1 },
        ]

      { id:"2.3", title:"Chain-of-Thought Prompting",
        summary:`## What Is Chain-of-Thought Prompting?\n\nChain-of-thought prompting is a technique that instructs the AI to think through a problem step by step before arriving at an answer — rather than jumping directly to a conclusion.\n\nThe core insight is simple: **AI models produce better answers when they reason out loud.** When you ask a complex question and the model is forced to show its thinking, it catches errors in its own logic, considers factors it might otherwise skip, and arrives at more nuanced, defensible conclusions.\n\nThink of it like asking a consultant to "show their work." A consultant who hands you a recommendation with no explanation is harder to trust than one who walks you through the analysis, the tradeoffs they considered, and why they landed where they did. The reasoning process itself is part of the value — and the same is true for AI.\n\n---\n\n## Why It Works\n\nWithout chain-of-thought prompting, an AI tends to take the most direct path from question to answer. This works fine for simple questions. But for complex, multi-variable problems — business decisions, risk analysis, strategic tradeoffs — the direct path often misses important nuance.\n\nWhen you force the model to reason step by step, two things happen:\n\n**First**, the model allocates more of its processing to the problem. Each reasoning step becomes a foundation for the next, building a more thorough analysis.\n\n**Second**, errors become visible and correctable. When the reasoning is explicit, you can see exactly where the logic went wrong and correct it — rather than just getting a wrong answer with no trail to follow.\n\n---\n\n## How to Trigger Chain-of-Thought\n\nYou do not need technical settings or special syntax. You trigger chain-of-thought with plain language in your prompt. Here are the most effective phrases:\n\n- "Think through this step by step before giving me your answer."\n- "Walk me through your reasoning before reaching a conclusion."\n- "Before answering, consider each factor separately, then synthesize."\n- "Reason through this out loud — I want to see your thinking, not just the conclusion."\n- "What are the key considerations here? Work through each one before making a recommendation."\n\nAny of these instructions shifts the model from conclusion-first to reasoning-first. The difference in output quality for complex questions is immediate and significant.\n\n---\n\n## Real Business Applications\n\nChain-of-thought prompting is most valuable when the stakes are high and the problem is genuinely complex. Here are situations you will encounter as a consultant:\n\n**Client risk assessment:**\n"A client is considering moving 40% of their liquid assets into a single private equity fund. Think through this step by step — what are the key risk factors to consider, what questions should be asked before deciding, and what are the strongest arguments both for and against this allocation? Work through each dimension before giving a recommendation."\n\n**Business decision analysis:**\n"My client is deciding whether to hire a full-time AI operations manager or outsource to a consulting firm. Walk me through the key tradeoffs — cost, control, speed, expertise, and long-term flexibility — reasoning through each factor before reaching a conclusion."\n\n**Document review:**\n"Review this contract clause by clause. For each clause, first explain what it means in plain English, then identify any potential risks or unusual terms, then rate its risk level as low, medium, or high. Work through each clause separately before giving an overall assessment."\n\nIn each case, the chain-of-thought instruction produces an output that is more thorough, more trustworthy, and more useful than a direct answer would be.\n\n---\n\n## Chain-of-Thought vs. Standard Prompting: A Direct Comparison\n\n**Standard prompt:** "Should my client invest in emerging market funds right now?"\n\n**Result:** A direct yes/no or generic overview. Probably safe and balanced, but shallow.\n\n**Chain-of-thought prompt:** "My client is a 52-year-old with a $4M portfolio, moderate risk tolerance, and a 15-year time horizon. They are asking whether to add emerging market exposure right now. Think through this step by step — consider their profile, current macro conditions, diversification implications, risk factors specific to emerging markets, and the behavioral psychology of adding volatility to a portfolio. Reason through each factor before making a recommendation."\n\n**Result:** A structured, reasoned analysis that considers multiple angles, acknowledges tradeoffs, and arrives at a recommendation you can actually act on — or present to a client with confidence.\n\n---\n\n## When to Use It and When Not To\n\nChain-of-thought is powerful but not always necessary. Use it when:\n- The problem has multiple variables or tradeoffs\n- The stakes are high and errors have consequences\n- You need to explain the reasoning to a client, not just the conclusion\n- The task involves judgment rather than information retrieval\n\nSkip it when:\n- The task is simple and well-defined (summarize this, format this, draft this email)\n- Speed matters more than depth\n- You just need a quick answer, not a full analysis\n\n**Your tool right now:** Use **Claude Sonnet**. Take a real business decision you are facing — anything from "should I build a website now or wait" to "how should I price my first consulting engagement" — and ask Claude to think through it step by step. Then ask the same question without the chain-of-thought instruction and compare the two answers side by side.`,
        quiz:[
          { q:"What is the core mechanism that makes chain-of-thought prompting produce better results on complex problems?", opts:["It forces the AI to use a larger model automatically","By reasoning step by step, the AI builds each conclusion on the previous one — producing more thorough analysis and making errors visible","It increases the temperature setting which produces more creative answers","It bypasses the AI's safety filters for sensitive business topics"], a:1 },
          { q:"Which of these phrases most effectively triggers chain-of-thought reasoning?", opts:["'Give me your best answer'","'Be thorough and detailed'","'Think through this step by step before giving me your answer'","'Use your full capabilities for this task'"], a:2 },
          { q:"A client asks you to use AI to analyze whether they should acquire a competitor. What prompting approach is most appropriate?", opts:["Standard prompt — AI is fast and the answer will be equally good either way","Chain-of-thought — this is a high-stakes, multi-variable decision where visible reasoning and tradeoff analysis are essential","Few-shot prompting — you need examples of similar acquisitions","Zero-shot with high temperature — creativity is needed for strategic decisions"], a:1 },
          { q:"When is chain-of-thought prompting NOT the best choice?", opts:["When analyzing financial data — numbers do not benefit from reasoning","When the task is simple and well-defined — like drafting a short email or formatting a document","When working with HNW clients — they prefer direct answers without visible reasoning","Chain-of-thought is always the best approach regardless of task complexity"], a:1 },
          { q:"What is the key advantage of making the AI's reasoning visible rather than just getting a conclusion?", opts:["Visible reasoning uses fewer tokens and reduces API costs","You can see exactly where the logic went wrong and correct it — rather than just receiving a wrong answer with no trail to follow","Visible reasoning always produces shorter responses that are easier to read","It prevents the AI from hallucinating facts entirely"], a:1 },
        ]
      },
      { id:"2.4", title:"Few-Shot Prompting Mastery",
        summary:`## Taking Few-Shot Further\n\nIn Lesson 1.6 you learned the foundation of few-shot prompting — providing examples so the AI learns by demonstration rather than description. In this lesson we go deeper: how to select the right examples, how to structure them for maximum effect, how to build few-shot prompts that scale across a client engagement, and how to combine few-shot with other techniques for compound results.\n\nIf basic few-shot prompting is knowing how to use a tool, this lesson is learning to use it with precision.\n\n---\n\n## The Quality Problem: Why Your Examples Matter More Than You Think\n\nThe single biggest mistake people make with few-shot prompting is using mediocre examples. They paste in whatever is available — an email they wrote quickly, a report that was "good enough," a post that got decent engagement — and then wonder why the AI output feels slightly off.\n\nHere is the rule: **the AI will replicate the quality level of your examples, not exceed it.** If your examples are B+ work, you will get B+ outputs. If your examples are genuinely excellent — the best work of that type you have ever produced or seen — you will get excellent outputs.\n\nBefore building a few-shot prompt, ask yourself: are these the three best examples of this output type I can find? If not, keep looking.\n\n---\n\n## How to Select the Right Examples\n\nGood few-shot examples share four characteristics:\n\n**1. Representative of the target output**\nThe examples should reflect exactly what you want the AI to produce — same format, same length, same tone, same level of formality. Do not use long examples if you want short outputs. Do not use casual examples if you want formal outputs.\n\n**2. Varied enough to show the range**\nThree identical-feeling examples teach the AI one narrow pattern. Three examples that each demonstrate the style from a slightly different angle teach the AI the underlying voice — which is more flexible and reusable. Think of it like teaching someone your handwriting versus making them copy one specific word.\n\n**3. Free of elements you do not want repeated**\nIf one of your examples contains a phrase, structure, or quirk you do not actually want in the output, the AI may replicate it. Review your examples critically before using them. Remove anything you would not want to see in the final output.\n\n**4. Clearly labeled**\nAlways label your examples so the AI understands the structure. Use "Example 1:", "Example 2:", "Example 3:" followed by a clear separator before your actual request. This prevents the AI from treating the examples as part of the task.\n\n---\n\n## The Full Few-Shot Structure\n\nHere is the complete structure for a professional few-shot prompt:\n\n"[Brief role or context if needed]\n\nHere are [number] examples of [output type] that represent the exact style, tone, and format I am looking for:\n\nExample 1:\n[paste example]\n\nExample 2:\n[paste example]\n\nExample 3:\n[paste example]\n\nNow, using the same voice, tone, length, and style as the examples above, [specific task and any constraints].\n\nDo not explain your process. Just produce the output."\n\nThat final line — "Do not explain your process. Just produce the output." — is a useful constraint that prevents the AI from narrating what it is doing instead of just doing it.\n\n---\n\n## Combining Few-Shot With Other Techniques\n\nFew-shot prompting becomes even more powerful when combined with the other techniques in this chapter:\n\n**Few-shot + Role:** Define a strong role first, then provide examples. The role sets the general identity and the examples sharpen the specific output style. Together they are more precise than either alone.\n\n**Few-shot + Constraints:** After your examples, add explicit constraints for things the examples do not cover — vocabulary to avoid, length limits, topics that are off-limits. This prevents the AI from inferring patterns from your examples that you did not intend.\n\n**Few-shot + Chain-of-Thought:** For complex outputs where the reasoning matters, you can provide examples that include visible reasoning — showing not just the output but how to think through the task. This is advanced technique but extremely powerful for analytical deliverables.\n\n---\n\n## Building a Few-Shot Library for a Client\n\nThe highest-value application of few-shot prompting in consulting work is building a reusable library of examples for a specific client. Here is the process:\n\n**Step 1:** Identify the 5-10 most common output types the client produces — emails, reports, proposals, social posts, internal memos, client updates.\n\n**Step 2:** For each output type, collect the 3 best examples the client has ever produced. Ask them directly: "Show me three [emails/reports/posts] that you felt really represented you at your best."\n\n**Step 3:** Build a few-shot prompt for each output type using those examples.\n\n**Step 4:** Test and refine — run several outputs through each prompt and adjust the examples or constraints until results are consistently on-brand.\n\n**Step 5:** Deliver the library as a document the client can use directly. Each prompt is a ready-to-use tool.\n\nThis library becomes a core consulting deliverable. It takes a few hours to build and delivers ongoing value every day. That is a retainer-worthy asset.\n\n**Your tool right now:** Use **Claude Sonnet**. Choose one type of writing you do regularly — emails, proposals, LinkedIn posts, anything. Find your three best examples of that writing. Build a complete few-shot prompt using the structure above. Test it and compare the output to what you would get from a basic prompt. Save this prompt — it is the beginning of your own Prompt Library.`,
        quiz:[
          { q:"Why do mediocre examples produce mediocre few-shot outputs?", opts:["The AI detects low-quality examples and reduces its processing effort","The AI replicates the quality level of the examples provided — it cannot exceed the quality of what it is shown","Mediocre examples confuse the AI and produce random outputs","The AI averages the quality across examples, so mediocre ones drag down the result"], a:1 },
          { q:"What does it mean for few-shot examples to be 'varied enough to show the range'?", opts:["You need examples from different authors and different time periods","Three examples that each demonstrate the style from slightly different angles teach the AI the underlying voice — not just one narrow pattern","You should use examples from different formats — emails, reports, and social posts together","Varied examples require a minimum of five to be effective"], a:1 },
          { q:"You build a few-shot prompt for a client but the outputs keep including a phrase the client dislikes. The phrase appeared in one of your examples. What is the fix?", opts:["Switch to a different Claude model","Add chain-of-thought instructions to override the examples","Remove the phrase from the example or add an explicit constraint telling the AI not to use it","Use more examples to dilute the influence of the problematic one"], a:2 },
          { q:"What does combining few-shot prompting with role-setting achieve that neither technique accomplishes alone?", opts:["It reduces the number of tokens needed for the prompt","The role sets the general identity and the examples sharpen the specific output style — together they are more precise than either alone","Role-setting and few-shot prompting cancel each other out and should never be combined","It automatically activates chain-of-thought reasoning"], a:1 },
          { q:"Why is a few-shot prompt library a retainer-worthy consulting asset?", opts:["Because prompt libraries are technically complex and require ongoing maintenance","It takes hours to build but delivers daily ongoing value — it is a reusable tool that makes every output consistently on-brand without starting from scratch each time","Clients will pay any amount for any AI-related deliverable","Because the library can be sold to the client's competitors"], a:1 },
        ]
      },
      { id:"2.5", title:"Negative Prompting",
        summary:`## What Is Negative Prompting?\n\nNegative prompting is the practice of explicitly telling the AI what NOT to do, include, say, or produce. It is the constraint layer of your prompt — and it is one of the most underused techniques in practical AI work.\n\nMost people focus entirely on the positive instruction: "write this," "produce that," "give me X." They describe the target. What they rarely do is describe the boundaries — and that is where AI outputs tend to drift into generic, off-brand, or inappropriate territory.\n\nThink of negative prompting like the guardrails on a mountain road. The road tells you where to go. The guardrails prevent you from going somewhere dangerous. You need both.\n\n---\n\n## Why AI Needs Explicit Constraints\n\nAI models are trained on enormous amounts of text, which means they have absorbed countless patterns, conventions, and defaults. When you ask for "a professional email," the model draws on everything it has seen that was labeled or behaved like a professional email. This includes all the clichés, the corporate boilerplate, the overused phrases that every professional email seems to contain.\n\nWithout negative prompting, the AI will often produce technically correct but deeply generic output. It follows the statistical average of what "professional" looks like — which is exactly what you are trying to avoid when building distinctive, branded tools for clients.\n\nNegative prompts break the AI out of its default patterns by explicitly closing doors it would otherwise walk through.\n\n---\n\n## Four Categories of Negative Prompting\n\n**Category 1 — Banned Words and Phrases**\nThe most direct form. Simply list words, phrases, or expressions you do not want to see.\n\nExamples:\n- "Do not use the words 'leverage,' 'synergy,' 'robust,' 'seamless,' or 'game-changer.'"\n- "Do not open with 'I hope this email finds you well' or any variation of it."\n- "Do not use the phrase 'as per my last email.'"\n- "Never use the word 'passion' or 'passionate' in any form."\n\n**Category 2 — Banned Formats**\nPrevent the AI from defaulting to structural patterns you do not want.\n\nExamples:\n- "Do not use bullet points. Write entirely in prose."\n- "Do not use headers or subheadings."\n- "Do not write more than 150 words."\n- "Do not produce a numbered list — I want a narrative."\n- "Do not add a conclusion paragraph — end after the recommendation."\n\n**Category 3 — Banned Topics or Positions**\nKeep the AI from wandering into territory that is off-limits for this tool or context.\n\nExamples:\n- "Do not offer opinions on specific stocks, funds, or investment products."\n- "Do not discuss the client's competitors."\n- "Do not make any claims about future performance or returns."\n- "Do not suggest the client change advisors or service providers."\n\n**Category 4 — Banned Tones or Behaviors**\nControl the register and approach, not just the content.\n\nExamples:\n- "Do not be sycophantic — do not open by complimenting the question."\n- "Do not hedge every statement with 'it depends' — give a clear recommendation."\n- "Do not use exclamation points."\n- "Do not apologize or express uncertainty — speak with authority."\n\n---\n\n## Negative Prompting in System Prompts\n\nNegative prompts are particularly powerful in system prompts because they apply permanently across every conversation. This means you build the constraints once and never have to remember to include them again.\n\nA well-crafted system prompt for a HNW client assistant might include a dedicated constraints section:\n\n"You must never: speculate on specific investment performance, discuss the client's competitors by name, use corporate jargon including 'leverage,' 'synergy,' or 'value-add,' open any response with a compliment on the question asked, or recommend any specific financial product or service. When asked about topics outside your scope, acknowledge the question and recommend the appropriate professional rather than attempting an answer."\n\nThis single paragraph saves the client from dozens of awkward AI outputs over time — and it is invisible to them. They just experience an assistant that always stays appropriate.\n\n---\n\n## The Negative Prompt Audit\n\nHere is a practical process for identifying what negative prompts a client needs:\n\n**Step 1:** Run 10 test prompts through their AI tool without any constraints. Collect the outputs.\n\n**Step 2:** Review each output with the client. Ask: "What bothers you about this? What would you never say? What feels off-brand?"\n\n**Step 3:** Convert every complaint into a constraint. "It feels too salesy" → "Do not use sales language or urgency-creating phrases." "It sounds corporate" → "Do not use: leverage, synergy, robust, scalable, best-in-class."\n\n**Step 4:** Add all constraints to the system prompt. Run the same 10 prompts again.\n\n**Step 5:** Repeat until the client says "yes, that sounds like us."\n\nThis audit process is a billable consulting session. You are not just writing prompts — you are uncovering a client's brand voice through structured elimination. That is genuine strategic work.\n\n**Your tool right now:** Use **Claude Sonnet**. Ask it to write something in your professional voice — an email, a LinkedIn post, anything. Read the output carefully and make a list of every word, phrase, format choice, or tone that feels wrong or unlike you. Convert that list into a set of negative prompt constraints. Add them to your next prompt and compare the result. You just started building your own constraint library.`,
        quiz:[
          { q:"What is the primary purpose of negative prompting?", opts:["To make the AI produce shorter responses","To explicitly tell the AI what NOT to do — closing the doors to generic, off-brand, or inappropriate outputs it would otherwise default to","To reduce the token count of your prompts","To prevent the AI from using chain-of-thought reasoning"], a:1 },
          { q:"Why does AI output tend toward generic corporate language without negative prompting?", opts:["AI models are programmed to be conservative by default","AI models draw on statistical patterns from training data — 'professional' outputs default to the average of all professional text they have seen, which includes all the clichés","Negative prompting is a paid feature not available in standard plans","Generic language is always technically correct so the AI prioritizes it"], a:1 },
          { q:"A client's AI assistant keeps opening every response with 'Great question!' which the client finds sycophantic. What is the most targeted fix?", opts:["Rebuild the entire system prompt from scratch","Add a banned-tone constraint: 'Do not open any response with a compliment on the question asked. Do not be sycophantic.'","Switch to a different Claude model that is less enthusiastic","Ask the client to add 'please do not say great question' to every user prompt"], a:1 },
          { q:"Why are negative prompts especially powerful when placed in a system prompt rather than individual user prompts?", opts:["System prompts process negative instructions more accurately than user prompts","Placed in the system prompt, constraints apply permanently across every conversation automatically — you build them once and never have to remember to include them again","Negative prompts only function correctly inside system prompts","User prompts cannot contain negative instructions"], a:1 },
          { q:"You run 10 test prompts for a client and review the outputs together. The client says 'it feels too salesy and not like us at all.' What is your next step?", opts:["Tell the client that AI always sounds slightly different from human writing","Ask the client to be more specific about what 'salesy' means before doing anything","Convert the complaint directly into constraints: identify the specific words, phrases, and tones that feel salesy and add them as explicit prohibitions to the system prompt","Start over with a completely different AI provider"], a:2 },
        ]
      },
      { id:"2.6", title:"Claude Projects — Your Command Center",
        summary:`## What Claude Projects Actually Is\n\nYou have been using Claude Projects throughout this entire program — but now it is time to understand it properly, because it is the most important tool in your consulting toolkit right now.\n\nClaude Projects is a feature within Claude.ai that lets you create persistent, configured AI workspaces. Each Project has three things that regular conversations do not have:\n\n**1. Project Instructions (your system prompt)** — Permanent instructions that apply to every conversation inside the Project. The AI reads these before every response.\n\n**2. Project Knowledge (uploaded files)** — Documents, data, reference materials, and context that the AI can access in every conversation. Think of it as the AI's briefing binder.\n\n**3. Conversation history within the Project** — All conversations inside a Project are grouped together, making it easy to find previous work and maintain context across sessions.\n\nTogether, these three features let you build something that a basic chat window cannot: a **configured, context-aware AI tool** that is customized for a specific purpose.\n\n---\n\n## Project Instructions: The Heart of the Tool\n\nThe Project Instructions field is where everything from this chapter comes together. This is where you apply role-setting, constraints, communication guidelines, scope limits, and behavioral rules — all in one place, permanently.\n\nA well-built Project Instructions document typically contains:\n\n**Identity and Role:** Who is this AI? What is its function? What expertise does it have?\n\n**Audience:** Who will it be talking to? What do they know? What do they need?\n\n**Behavioral Rules:** How should it communicate? What tone? What format? What length?\n\n**Constraints:** What must it never do, say, or recommend?\n\n**Scope:** What is this tool for? What questions should it redirect or decline?\n\n**Context:** What does the AI need to know about the client, the business, or the situation to do its job well?\n\nA Project Instructions document for a real client tool might be 300-600 words. That investment of writing time creates a tool that works correctly every single time — without the user needing to re-explain context in every conversation.\n\n---\n\n## Project Knowledge: Giving the AI a Brain\n\nThe Project Knowledge feature is genuinely powerful and underused. It lets you upload documents that the AI can reference in every conversation. This means you can:\n\n**Upload a client's brand guidelines** — The AI always writes on-brand without being told.\n\n**Upload a product or service catalog** — The AI always has accurate information without hallucinating details.\n\n**Upload a client's existing communications** — The AI learns from real examples, making few-shot prompting more powerful.\n\n**Upload reference documents** — Regulatory guidelines, company policies, pricing structures, FAQs — anything the AI needs to know to do its job accurately.\n\n**Upload a style guide** — Specific vocabulary preferences, formatting rules, tone guidelines.\n\nThe knowledge you upload becomes part of the AI's context for every conversation. This is how you build AI tools that are genuinely knowledgeable about a specific client's world — not just generic AI pretending to know things.\n\n---\n\n## Building Your First Real Client-Ready Project\n\nHere is the process for building a Project that could actually be used with a client:\n\n**Step 1 — Define the purpose.** What specific job does this tool do? Be narrow. "General assistant" is not a purpose. "Drafts client update emails after portfolio review meetings" is a purpose.\n\n**Step 2 — Write the Project Instructions.** Using everything from this chapter: role, context, behavioral rules, constraints, scope. Be specific. Test it by asking yourself: if a new employee read only this document, would they know exactly how to behave in every situation?\n\n**Step 3 — Upload relevant knowledge.** What documents does the AI need to do this job well? Upload them.\n\n**Step 4 — Test with realistic scenarios.** Run 10 prompts that represent real use cases. Review every output. Identify anything that is off and add it to your constraints.\n\n**Step 5 — Refine until consistent.** The goal is that any input related to the tool's purpose produces an output the client would be happy with, without additional editing. That is the bar.\n\n---\n\n## Projects as a Consulting Deliverable\n\nHere is the business model insight: a configured Claude Project is a product you can build and hand to a client. You are not teaching them to use AI — you are giving them a purpose-built AI tool that requires minimal expertise to operate.\n\nThe client gets: a tool that works correctly, sounds like their brand, stays within appropriate limits, and requires no prompt engineering knowledge to use.\n\nYou get: a clear, tangible deliverable that demonstrates expertise, justifies your fee, and often leads to ongoing retainer work as the tool needs updating and expanding.\n\n**Your tool right now:** Build a complete Claude Project right now — not a test, a real one. Choose a purpose: your own consulting intake assistant, a content drafting tool for your business, or a research assistant. Write the Project Instructions using all five components above. Upload at least one relevant document. Test it with five realistic prompts. This is your first portfolio piece.`,
        quiz:[
          { q:"What are the three features that make Claude Projects fundamentally different from a regular chat conversation?", opts:["Speed, cost, and model size","Project Instructions (system prompt), Project Knowledge (uploaded files), and grouped conversation history","Private mode, team sharing, and API access","Custom models, fine-tuning, and dedicated servers"], a:1 },
          { q:"A client runs a wealth management firm and wants an AI assistant that always knows their fee structure, investment philosophy, and compliance restrictions. Which Claude Projects feature handles this most directly?", opts:["Project Instructions — write the fee structure into the system prompt","Project Knowledge — upload the fee schedule, investment policy statement, and compliance guidelines as documents the AI can reference","The conversation history — the AI will learn over time from previous conversations","None — this level of customization requires API access not available in Claude Projects"], a:1 },
          { q:"What is the bar for a well-built client-ready Claude Project?", opts:["The system prompt is longer than 500 words","Any input related to the tool's purpose produces an output the client would be happy with, without additional editing","The client can operate it without any onboarding or explanation","The tool handles every possible topic the client might raise"], a:2 },
          { q:"Why is 'General assistant' a weak Project purpose compared to 'Drafts client update emails after portfolio review meetings'?", opts:["General assistants are not allowed in Claude Projects","A narrow, specific purpose produces clearer instructions, better constraints, and more consistently useful outputs — broad purposes lead to inconsistent, unfocused tools","General assistants require a different pricing tier","Narrow purposes use fewer tokens per conversation"], a:1 },
          { q:"What is the business model insight behind delivering a configured Claude Project to a client rather than teaching them to use AI?", opts:["Projects are easier to build than training sessions so the margins are better","You give the client a purpose-built tool that works correctly without prompt engineering knowledge — a tangible deliverable that demonstrates expertise and often leads to ongoing retainer work","Claude Projects automatically generates invoices for clients","Clients always prefer tools over knowledge — training has no consulting value"], a:1 },
        ]
      },
      { id:"2.7", title:"Build Your Prompt Library",
        summary:`## What Is a Prompt Library and Why Does It Matter?\n\nA Prompt Library is a curated collection of tested, refined, ready-to-use prompts organized by use case. It is one of the most valuable assets you can build as an AI consultant — both for your own work and as a deliverable for clients.\n\nThink of it like a professional toolkit. A carpenter does not build every tool from scratch on each job site. They arrive with a set of proven, reliable tools they know work. A Prompt Library is your AI toolkit — prompts you have tested, refined, and know produce excellent results every time.\n\nThe difference between a consultant who starts from scratch on every AI task and one who has a well-built Prompt Library is the difference between a contractor who shows up with a hammer and one who shows up with a fully equipped truck.\n\n---\n\n## What Goes in a Prompt Library\n\nA professional Prompt Library is organized by category, not just thrown into a document. Here is a structure that works well for a generalist AI consultant serving HNW individuals and small businesses:\n\n**Category 1 — Communication**\n- Client email drafting (formal)\n- Client email drafting (follow-up)\n- Meeting recap and next steps\n- Difficult conversation framing\n- Proposal and pitch outlines\n\n**Category 2 — Analysis and Research**\n- Document summary (long)\n- Document summary (executive brief)\n- Competitive analysis framework\n- Risk identification and assessment\n- Market research synthesis\n\n**Category 3 — Content Creation**\n- LinkedIn posts (thought leadership)\n- Newsletter sections\n- Bio and profile writing\n- Case study structure\n- FAQ generation\n\n**Category 4 — Operations**\n- Meeting agenda creation\n- Process documentation\n- Job description drafting\n- Onboarding material structure\n- Policy draft framework\n\n**Category 5 — Client-Specific**\nThis category is blank until you have clients. Then you add custom prompts built specifically for each client's voice, industry, and use cases.\n\n---\n\n## The Anatomy of a Library Entry\n\nEach prompt in your library should be more than just the prompt text. A professional entry includes:\n\n**Title:** What does this prompt do? One clear line.\n\n**Best for:** What situations or output types is this prompt designed for?\n\n**Model recommendation:** Haiku, Sonnet, or Opus? Why?\n\n**The prompt:** The full, ready-to-use prompt text with [bracketed placeholders] for the parts you fill in each time.\n\n**Output notes:** What should the output look like? What are the common failure modes and how do you fix them?\n\n**Last updated:** When did you last test and refine this prompt?\n\nThis structure means anyone — including a future team member or a client — can pick up the library and use it effectively without additional explanation.\n\n---\n\n## How to Build and Refine Library Entries\n\nBuilding a library entry is not a one-shot process. Here is the workflow:\n\n**Step 1 — Draft the prompt** using the power prompt framework from Lesson 2.1. Role + Context + Task + Format + Constraints + Examples.\n\n**Step 2 — Test it five times** with different inputs. Note every output that is off — too long, wrong tone, missing something, includes something unwanted.\n\n**Step 3 — Refine based on failures.** Every failure tells you what constraint or instruction is missing. Add it.\n\n**Step 4 — Test five more times.** If you get five acceptable outputs in a row, the prompt is library-ready.\n\n**Step 5 — Document it** using the full entry format above.\n\n**Step 6 — Update quarterly.** AI models improve and change over time. A prompt that worked perfectly six months ago may need adjustment. Schedule a quarterly review.\n\n---\n\n## Your Prompt Library as a Client Deliverable\n\nHere is the insight that turns this into a business asset: you can build custom Prompt Libraries for clients, not just for yourself.\n\nA client-specific Prompt Library contains 15-25 prompts designed around their specific use cases, voice, industry, and constraints. Each prompt has been tested against their actual content and refined until it produces on-brand results consistently.\n\nDelivering this library means:\n- The client has AI tools they can use immediately without prompt engineering knowledge\n- Every output is consistent with their brand voice\n- You have documented your value in a tangible, reusable format\n- The library needs periodic updating — creating ongoing engagement\n\nThis is a project-based deliverable with a clear scope, a clear output, and a clear ongoing maintenance value. Price it accordingly.\n\n---\n\n## Chapter 2 Deliverable: Your Personal Prompt Library v1.0\n\nBy the end of this lesson, you should have a working Prompt Library with at least 10 entries across at least three categories. It does not need to be perfect — it needs to exist and be tested.\n\nStart here: pick the three output types you produce most often in your own work. Build one prompt for each. Test them. Document them. That is your foundation. Add to it every week and by Month 6 you will have a library of 50+ tested prompts that covers nearly every client situation you encounter.\n\n**Your tool right now:** Open a Google Doc titled "Prompt Library v1.0 — [Your Name]." Create the five category headers above. Under Communications, build your first entry: a client email drafting prompt using all six components from Lesson 2.1. Test it five times. Document it with all fields completed. That one entry is the foundation of a consulting asset you will use for years.`,
        quiz:[
          { q:"What is the core purpose of a Prompt Library in a consulting business?", opts:["To impress clients with the volume of prompts you have collected","A curated collection of tested, refined, ready-to-use prompts that eliminates starting from scratch — your proven AI toolkit for consistent, high-quality outputs","To store all AI outputs for future reference and compliance","A record of every prompt you have ever written, regardless of quality"], a:1 },
          { q:"Using the carpenter analogy, what is the difference between a consultant with a Prompt Library and one without?", opts:["The difference is purely cosmetic — both produce identical quality work","A consultant without a library builds every tool from scratch on each job. A consultant with a library arrives with a fully equipped, proven toolkit — faster, more reliable, more professional","Prompt libraries are only useful for technical AI tasks, not business consulting","A library makes you dependent on past work rather than being creative fresh each time"], a:1 },

          { q:"How many times should you test a prompt before considering it library-ready?", opts:["Once — if it works the first time it is ready","Three times minimum","At least ten tests across two separate rounds — five tests to identify failures, refine, then five more to confirm consistent quality","Until you get a perfect output — however many tests that takes"], a:2 },

const TOTAL = CURRICULUM.reduce((a,c) => a + c.lessons.length, 0);
let completed = {};
let activeLesson = null;
let quizAnswers = {};
let quizSubmitted = false;
let quizScore = 0;
let currentPIN = null;

// ── Chapter 1 permanently pre-completed ──
const CH1_COMPLETE = {"1.1":true,"1.2":true,"1.3":true,"1.4":true,"1.5":true,"1.6":true,"1.7":true};

const KVDB_BUCKET = '';
const KVDB = '';

async function loadProgress(pin) {}

async function saveProgress() {
  try { localStorage.setItem('aifa-progress', JSON.stringify(completed)); } catch(e) {}
}

async function pinExists(pin) { return false; }

// ── PIN UI ──
function setPINDisplay(msg, color) {
  const el = document.getElementById('pin-message');
  el.textContent = msg;
  el.style.color = color || 'var(--text-dim)';
}

function updatePINDots(val) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.style.background = i < val.length ? 'var(--gold)' : 'rgba(255,255,255,0.15)';
    dot.style.transform = i < val.length ? 'scale(1.2)' : 'scale(1)';
  }
}

function pinPress(val) {
  const input = document.getElementById('pin-input');
  if (input.value.length < 4) {
    input.value += val;
    updatePINDots(input.value);
    if (input.value.length === 4) {
      setTimeout(() => handlePINSubmit(), 200);
    }
  }
}

function pinBackspace() {
  const input = document.getElementById('pin-input');
  input.value = input.value.slice(0, -1);
  updatePINDots(input.value);
  setPINDisplay('Enter your 4-digit PIN');
}

async function handlePINSubmit() {
  const pin = document.getElementById('pin-input').value;
  if (pin.length !== 4) return;

  const mode = document.getElementById('pin-mode').value;
  setPINDisplay('Checking...', 'var(--gold)');

  if (mode === 'login') {
    const exists = await pinExists(pin);
    if (exists) {
      currentPIN = pin;
      await loadProgress(pin);
      showCurriculum();
    } else {
      setPINDisplay('PIN not found. Try again or create a new one.', 'var(--red)');
      document.getElementById('pin-input').value = '';
      updatePINDots('');
    }
  } else {
    const exists = await pinExists(pin);
    if (exists) {
      setPINDisplay('That PIN is already taken. Choose a different one.', 'var(--red)');
      document.getElementById('pin-input').value = '';
      updatePINDots('');
    } else {
      currentPIN = pin;
      completed = { ...CH1_COMPLETE };
      await saveProgress();
      showCurriculum();
    }
  }
}

function switchPINMode(mode) {
  document.getElementById('pin-mode').value = mode;
  document.getElementById('pin-input').value = '';
  updatePINDots('');
  if (mode === 'login') {
    document.getElementById('pin-title').textContent = 'Welcome Back';
    document.getElementById('pin-subtitle').textContent = 'Enter your 4-digit PIN to load your progress';
    document.getElementById('pin-switch-text').innerHTML = 'New here? <button onclick="switchPINMode(\'create\')" style="background:none;border:none;color:var(--gold);cursor:pointer;font-family:\'DM Mono\',monospace;font-size:0.8rem;text-decoration:underline">Create a PIN</button>';
  } else {
    document.getElementById('pin-title').textContent = 'Create Your PIN';
    document.getElementById('pin-subtitle').textContent = 'Pick a 4-digit PIN — you will use this every time you open the curriculum';
    document.getElementById('pin-switch-text').innerHTML = 'Already have one? <button onclick="switchPINMode(\'login\')" style="background:none;border:none;color:var(--gold);cursor:pointer;font-family:\'DM Mono\',monospace;font-size:0.8rem;text-decoration:underline">Sign in</button>';
  }
  setPINDisplay('');
}

// ── ROUTING ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showCurriculum() { renderCurriculum(); showPage('curriculum'); }
function showLesson() { renderLesson(); showPage('lesson'); }
function showQuiz() { renderQuiz(); showPage('quiz'); }

// ── HELPERS ──
function isUnlocked(ci) {
  return true; // All chapters always accessible
}

function parseSummary(text) {
  return text.split('\n\n').map(para => {
    const trimmed = para.trim();
    if (trimmed === '---') return '<hr>';
    if (trimmed.startsWith('## ')) {
      const heading = trimmed.slice(3);
      return '<h2>' + heading + '</h2>';
    }
    const parts = trimmed.split(/\*\*(.*?)\*\*/g);
    const html = parts.map((p, i) => i % 2 === 1 ? `<strong>${p}</strong>` : p).join('');
    return '<p>' + html + '</p>';
  }).join('');
}

// ── RENDER CURRICULUM ──
function renderCurriculum() {
  const done = Object.values(completed).filter(Boolean).length;
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = done + ' / ' + TOTAL;

  const container = document.getElementById('chapters');
  container.innerHTML = '';

  CURRICULUM.forEach((ch, ci) => {
    const unlocked = isUnlocked(ci);
    const chDone = ch.lessons.every(l => completed[l.id]);
    const chProgress = ch.lessons.filter(l => completed[l.id]).length;
    const isOpen = ci === 0;

    const div = document.createElement('div');
    div.className = 'chapter' + (unlocked ? '' : ' locked') + (isOpen ? ' open' : '');
    div.id = 'ch-' + ch.ch;

    div.innerHTML = `
      <button class="chapter-header" onclick="toggleChapter(${ci})">
        <div class="ch-left">
          <div class="ch-badge${chDone ? ' done' : ''}">${chDone ? '✓' : ch.ch}</div>
          <div class="ch-meta">
            <span class="ch-eyebrow">Chapter ${ch.ch}</span>
            <span class="ch-title">${ch.title}</span>
          </div>
        </div>
        <div class="ch-right">
          <span class="ch-count">${chProgress}/${ch.lessons.length}</span>
          ${!unlocked ? '<span>🔒</span>' : ''}
          <span class="ch-arrow">▾</span>
        </div>
      </button>
      <div class="lesson-list" style="display:${isOpen ? 'block' : 'none'}">
        ${ch.lessons.map(l => `
          <button class="lesson-row${completed[l.id] ? ' done-row' : ''}" onclick="openLesson('${l.id}', ${ci})">
            <div class="lr-left">
              <div class="dot${completed[l.id] ? ' done' : ''}">${completed[l.id] ? '✓' : ''}</div>
              <span class="lesson-id">${l.id}</span>
              <span class="lesson-title">${l.title}</span>
            </div>
            ${unlocked ? '<span class="lr-arrow">→</span>' : ''}
          </button>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleChapter(ci) {
  if (!isUnlocked(ci)) return;
  const el = document.getElementById('ch-' + CURRICULUM[ci].ch);
  const list = el.querySelector('.lesson-list');
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  list.style.display = isOpen ? 'none' : 'block';
}

// ── OPEN LESSON ──
function openLesson(id, ci) {
  if (!isUnlocked(ci)) return;
  const ch = CURRICULUM[ci];
  activeLesson = ch.lessons.find(l => l.id === id);
  if (!activeLesson) return;
  quizAnswers = {}; quizSubmitted = false; quizScore = 0;
  showLesson();
}

function renderLesson() {
  if (!activeLesson) return;
  const isDone = completed[activeLesson.id];
  const hasQuiz = activeLesson.quiz.length > 0;

  document.getElementById('lesson-content').innerHTML = `
    <div>
      <span class="lesson-tag">${activeLesson.id}</span>
      ${isDone ? '<span class="done-pill">✓ Completed</span>' : ''}
    </div>
    <h1 class="lesson-h1">${activeLesson.title}</h1>
    <div class="lesson-body">${parseSummary(activeLesson.summary)}</div>
    ${hasQuiz && !isDone ? `<button class="quiz-btn" onclick="showQuiz()">Take the Quiz →</button>` : ''}
    ${hasQuiz && isDone ? `<button class="retake-btn" onclick="showQuiz()">Retake Quiz</button>` : ''}
    ${!hasQuiz ? `<p class="coming-soon">This lesson will be available soon.</p>` : ''}
  `;
}

// ── QUIZ ──
function renderQuiz() {
  if (!activeLesson) return;
  const q = activeLesson.quiz;

  let resultHTML = '';
  if (quizSubmitted) {
    if (quizScore === q.length) {
      resultHTML = `<div class="result-banner pass"><span class="icon">🎉</span><div><strong>Perfect score! Lesson completed.</strong><p>You've earned your checkmark.</p></div></div>`;
    } else {
      resultHTML = `<div class="result-banner fail"><span class="icon">🔍</span><div><strong>${quizScore}/5 — Review highlighted answers below</strong><p>Incorrect answers are marked in red. Try again when ready.</p></div></div>`;
    }
  }

  const questionsHTML = q.map((item, qi) => {
    const chosen = quizAnswers[qi];
    const isCorrect = chosen === item.a;
    return `
      <div class="q-card">
        <div class="q-text"><span class="q-num">Q${qi+1}</span>${item.q}</div>
        <div class="options">
          ${item.opts.map((opt, oi) => {
            let cls = 'opt-btn';
            if (!quizSubmitted && chosen === oi) cls += ' selected';
            if (quizSubmitted && oi === item.a) cls += ' correct';
            if (quizSubmitted && chosen === oi && !isCorrect) cls += ' wrong';
            if (quizSubmitted) cls += ' disabled';
            return `<button class="${cls}" onclick="selectAnswer(${qi},${oi})"><span class="opt-letter">${String.fromCharCode(65+oi)}</span>${opt}</button>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  const allAnswered = Object.keys(quizAnswers).length === q.length;

  let actionsHTML = '';
  if (!quizSubmitted) {
    actionsHTML = `<button class="quiz-btn" onclick="submitQuiz()" style="${allAnswered ? '' : 'opacity:0.4;cursor:not-allowed'}" ${allAnswered ? '' : 'disabled'}>Submit Answers</button>`;
  } else if (quizScore < q.length) {
    actionsHTML = `<button class="quiz-btn" onclick="retryQuiz()">Retry Quiz</button>`;
  } else {
    actionsHTML = `<button class="quiz-btn" onclick="showCurriculum()">← Back to Curriculum</button>`;
  }

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-header">
      <span class="lesson-tag">${activeLesson.id}</span>
      <h2 class="quiz-h2">Quiz — ${activeLesson.title}</h2>
      <p class="quiz-sub">Score 5/5 to complete this lesson</p>
    </div>
    ${resultHTML}
    <div class="questions">${questionsHTML}</div>
    <div class="quiz-actions">${actionsHTML}</div>
  `;
}

function selectAnswer(qi, oi) {
  if (quizSubmitted) return;
  quizAnswers[qi] = oi;
  renderQuiz();
}

function submitQuiz() {
  const q = activeLesson.quiz;
  if (Object.keys(quizAnswers).length < q.length) return;
  quizScore = q.filter((item, i) => quizAnswers[i] === item.a).length;
  quizSubmitted = true;
  if (quizScore === q.length) {
    completed[activeLesson.id] = true;
    saveProgress();
  }
  renderQuiz();
}

function retryQuiz() {
  quizAnswers = {}; quizSubmitted = false; quizScore = 0;
  renderQuiz();
}

// ── INIT ──
// No PIN, no locks — open access to everything
try {
  const saved = localStorage.getItem('aifa-progress');
  completed = saved ? { ...CH1_COMPLETE, ...JSON.parse(saved) } : { ...CH1_COMPLETE };
} catch(e) { completed = { ...CH1_COMPLETE }; }
showCurriculum();
</script>
