<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Foundation Architect — Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c18;
    --bg2: #0d1424;
    --bg3: #111a2e;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --text: #dce8f5;
    --text-dim: #6b80a0;
    --text-mid: #99b0cc;
    --border: rgba(255,255,255,0.07);
    --border-gold: rgba(201,168,76,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20vh; left: 50%;
    transform: translateX(-50%);
    width: 60vw; height: 40vh;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  #app { position: relative; z-index: 1; }

  .page { display: none; padding: 2rem 1rem; min-height: 100vh; }
  .page.active { display: block; }
  .container { max-width: 740px; margin: 0 auto; }

  /* ── HEADER ── */
  .site-header {
    padding: 2.5rem 1rem 0;
    max-width: 740px;
    margin: 0 auto 2.5rem;
  }
  .site-header .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }
  .site-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .site-header .subtitle {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 0.5rem;
  }

  /* ── PROGRESS BAR ── */
  .progress-strip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }
  .progress-strip .label { font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; }
  .progress-strip .count { font-size: 0.7rem; color: var(--gold); font-weight: 500; white-space: nowrap; }
  .track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── CHAPTERS ── */
  .chapter {
    margin-bottom: 0.75rem;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg2);
    overflow: hidden;
    transition: opacity 0.3s;
  }
  .chapter.locked { opacity: 0.45; }

  .chapter-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.25rem;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    gap: 1rem;
  }
  .chapter.locked .chapter-header { cursor: not-allowed; }

  .ch-left { display: flex; align-items: center; gap: 0.85rem; }
  .ch-badge {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border-gold);
    background: var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: var(--gold); font-weight: 600;
    flex-shrink: 0;
  }
  .ch-badge.done { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .ch-meta { display: flex; flex-direction: column; gap: 0.15rem; }
  .ch-eyebrow { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
  .ch-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--text); }
  .ch-right { display: flex; align-items: center; gap: 0.75rem; }
  .ch-count { font-size: 0.7rem; color: var(--text-dim); }
  .ch-arrow { font-size: 0.7rem; color: var(--text-dim); transition: transform 0.2s; }
  .chapter.open .ch-arrow { transform: rotate(180deg); }

  /* ── LESSON LIST ── */
  .lesson-list { border-top: 1px solid var(--border); }
  .lesson-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.25rem;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    gap: 0.75rem;
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-row:hover { background: rgba(255,255,255,0.03); }
  .lesson-row.done-row .lesson-title { color: var(--text-dim); }
  .lr-left { display: flex; align-items: center; gap: 0.75rem; }
  .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.6rem;
  }
  .dot.done { background: var(--green); border-color: var(--green); color: #050d1a; font-weight: 900; }
  .lesson-id { font-size: 0.7rem; color: var(--text-dim); min-width: 2.2rem; }
  .lesson-title { font-size: 0.875rem; color: var(--text); }
  .lr-arrow { font-size: 0.75rem; color: var(--gold); opacity: 0.6; }

  /* ── LESSON PAGE ── */
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.35rem 0.85rem;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    margin-bottom: 1.75rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  .lesson-tag {
    display: inline-block;
    background: var(--gold-dim);
    color: var(--gold);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
  }
  .done-pill {
    display: inline-block;
    background: var(--green-dim);
    color: var(--green);
    font-size: 0.65rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    margin-left: 0.4rem;
  }
  .lesson-h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin: 0.4rem 0 1.75rem;
  }
  .lesson-body {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    font-size: 0.875rem;
    line-height: 1.85;
    color: var(--text-mid);
  }
  .lesson-body p { margin-bottom: 1rem; }
  .lesson-body p:last-child { margin-bottom: 0; }
  .lesson-body strong { color: var(--gold-light); font-weight: 500; }
  .lesson-body h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin: 2rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .lesson-body h2:first-child { margin-top: 0; }
  .lesson-body hr { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

  .quiz-btn {
    display: inline-block;
    margin-top: 1.75rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #050d1a;
    border: none;
    padding: 0.75rem 1.75rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .quiz-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .retake-btn {
    display: inline-block;
    margin-top: 1.75rem;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 0.72rem 1.75rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .retake-btn:hover { background: var(--gold-dim); }
  .coming-soon { color: var(--text-dim); font-size: 0.8rem; font-style: italic; margin-top: 1.5rem; }

  /* ── QUIZ PAGE ── */
  .quiz-header { margin-bottom: 2rem; }
  .quiz-h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-weight: 700;
    color: var(--text);
    margin: 0.4rem 0 0.25rem;
  }
  .quiz-sub { font-size: 0.72rem; color: var(--text-dim); }

  .result-banner {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    border: 1px solid;
    margin-bottom: 2rem;
    font-size: 0.82rem;
  }
  .result-banner.pass { background: var(--green-dim); border-color: var(--green); }
  .result-banner.fail { background: var(--red-dim); border-color: var(--red); }
  .result-banner .icon { font-size: 1.4rem; flex-shrink: 0; }
  .result-banner strong { display: block; margin-bottom: 0.2rem; }
  .result-banner.pass strong { color: var(--green); }
  .result-banner.fail strong { color: var(--red); }
  .result-banner p { color: var(--text-dim); font-size: 0.75rem; margin: 0; }

  .questions { display: flex; flex-direction: column; gap: 1.5rem; }
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .q-text {
    font-size: 0.875rem;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 1rem;
    line-height: 1.6;
    display: flex;
    gap: 0.65rem;
  }
  .q-num {
    background: var(--gold-dim);
    color: var(--gold);
    font-size: 0.6rem;
    font-weight: 600;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 0.15rem;
    letter-spacing: 0.05em;
  }
  .options { display: flex; flex-direction: column; gap: 0.45rem; }
  .opt-btn {
    width: 100%;
    text-align: left;
    padding: 0.6rem 0.9rem;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.02);
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    line-height: 1.45;
  }
  .opt-btn:hover:not(.disabled) { background: rgba(201,168,76,0.06); border-color: var(--border-gold); color: var(--text); }
  .opt-btn.selected { background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold); }
  .opt-btn.correct { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .opt-btn.wrong { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .opt-btn.disabled { cursor: default; }
  .opt-letter { font-size: 0.65rem; opacity: 0.5; font-weight: 600; flex-shrink: 0; }

  .quiz-actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }

  /* ── PIN PAGE ── */
  .pin-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .pin-card {
    background: var(--bg2);
    border: 1px solid var(--border-gold);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .pin-eyebrow { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .pin-h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
  .pin-sub { font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 2rem; }
  .pin-dots { display: flex; justify-content: center; gap: 0.85rem; margin-bottom: 1.5rem; }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.15s, transform 0.15s;
  }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
  .key-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .key-btn:hover { background: var(--gold-dim); border-color: var(--border-gold); color: var(--gold); }
  .key-btn.backspace { font-size: 0.85rem; color: var(--text-dim); }
  .key-btn.zero { grid-column: 2; }
  .pin-message { font-size: 0.75rem; min-height: 1.2rem; margin-bottom: 1rem; transition: color 0.2s; }
  .pin-switch { font-size: 0.75rem; color: var(--text-dim); margin-top: 1rem; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .page.active .container { animation: fadeUp 0.35s ease both; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .site-header h1 { font-size: 1.8rem; }
    .lesson-body { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- PIN PAGE -->
  <div id="page-pin" class="page active" style="padding:0">
    <div class="pin-page">
      <div class="pin-card">
        <p class="pin-eyebrow">AI Foundation Architect</p>
        <h1 class="pin-h1" id="pin-title">Welcome Back</h1>
        <p class="pin-sub" id="pin-subtitle">Enter your 4-digit PIN to load your progress</p>
        <input type="hidden" id="pin-input" value=""/>
        <input type="hidden" id="pin-mode" value="login"/>
        <div class="pin-dots">
          <div class="pin-dot" id="dot-0"></div>
          <div class="pin-dot" id="dot-1"></div>
          <div class="pin-dot" id="dot-2"></div>
          <div class="pin-dot" id="dot-3"></div>
        </div>
        <p class="pin-message" id="pin-message"></p>
        <div class="pin-keypad">
          <button class="key-btn" onclick="pinPress('1')">1</button>
          <button class="key-btn" onclick="pinPress('2')">2</button>
          <button class="key-btn" onclick="pinPress('3')">3</button>
          <button class="key-btn" onclick="pinPress('4')">4</button>
          <button class="key-btn" onclick="pinPress('5')">5</button>
          <button class="key-btn" onclick="pinPress('6')">6</button>
          <button class="key-btn" onclick="pinPress('7')">7</button>
          <button class="key-btn" onclick="pinPress('8')">8</button>
          <button class="key-btn" onclick="pinPress('9')">9</button>
          <button class="key-btn backspace" onclick="pinBackspace()">⌫</button>
          <button class="key-btn zero" onclick="pinPress('0')">0</button>
        </div>
        <p class="pin-switch" id="pin-switch-text">New here? <button onclick="switchPINMode('create')" style="background:none;border:none;color:var(--gold);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.8rem;text-decoration:underline">Create a PIN</button></p>
      </div>
    </div>
  </div>

  <!-- CURRICULUM PAGE -->
  <div id="page-curriculum" class="page active">
    <div class="site-header">
      <p class="eyebrow">7-Month Program · Phase 1</p>
      <h1>AI Foundation<br>Architect</h1>
      <p class="subtitle">Complete each lesson · Pass the quiz · Earn your checkmark</p>
    </div>
    <div class="container">
      <div class="progress-strip">
        <span class="label">Overall Progress</span>
        <div class="track"><div class="fill" id="prog-fill" style="width:0%"></div></div>
        <span class="count" id="prog-count">0 / 28</span>
      </div>
      <div id="chapters"></div>
      <p style="text-align:center;color:#2a3a55;font-size:0.7rem;margin-top:1.5rem;">Chapters unlock sequentially as you complete each one.</p>
    </div>
  </div>

  <!-- LESSON PAGE -->
  <div id="page-lesson" class="page">
    <div class="container">
      <button class="back-btn" onclick="showCurriculum()">← Curriculum</button>
      <div id="lesson-content"></div>
    </div>
  </div>

  <!-- QUIZ PAGE -->
  <div id="page-quiz" class="page">
    <div class="container">
      <button class="back-btn" onclick="showLesson()">← Back to Lesson</button>
      <div id="quiz-content"></div>
    </div>
  </div>

  <!-- CHAPTER EXAM PAGE -->
  <div id="page-exam" class="page">
    <div class="container">
      <button class="back-btn" onclick="showCurriculum()">← Curriculum</button>
      <div id="exam-content"></div>
    </div>
  </div>

</div>

<script>
const CURRICULUM = [
  {
    ch: 1, title: "Learn the Language",
    lessons: [
      {
        id: "1.1", title: "Context Windows & Tokens",
        summary: `## What Is a Token?\n\nBefore you can understand context windows, you need to understand tokens — because context windows are measured in them.\n\nA **token** is the basic unit of text that an AI model reads, processes, and writes. It is not exactly a word. It is not exactly a character. It sits somewhere in between. A useful rule of thumb: **1 token ≈ ¾ of an English word.** So the sentence "The client wants a report" is roughly 7 tokens.\n\nWhy does AI use tokens instead of just words? Because AI models don't read language the way humans do. They break text into chunks that are statistically meaningful based on how language patterns work. Common words like "the" or "and" are single tokens. Longer or rarer words might be broken into 2–3 tokens. Numbers, punctuation, and spaces are tokens too.\n\nHere is why this matters practically: **AI models are billed by token usage.** When you use Claude via API (which you will eventually do for clients), you pay per token — both for what you send in and what the model sends back. Understanding tokens helps you understand cost.\n\n## What Is a Context Window?\n\nThe **context window** is the total number of tokens an AI model can hold in its "working memory" at one time — everything it can see, reference, and reason about in a single session. This includes your instructions, the entire conversation history, any documents you've uploaded, and the model's own responses.\n\nThink of it like a physical desk. Everything on your desk is what you can actively work with right now. The bigger the desk, the more you can spread out. A small desk forces you to put things away to make room for new items. An AI's context window works the same way — when a conversation gets long enough to fill the window, the oldest content gets pushed off the edge and the model can no longer "see" it.\n\n**Claude's context window is 200,000 tokens** — roughly 150,000 words, or about the length of a full novel. This is one of the largest in the industry and is a genuine competitive advantage for Claude in business settings.\n\nFor comparison: GPT-4o has a 128,000 token context window. Google Gemini 1.5 Pro has a 1,000,000 token context window — the largest available, though that product has other tradeoffs.\n\n## Why Tokens and Context Windows Matter for Your Consulting Business\n\nThis is not just academic knowledge. Here are three real situations where you will use this:\n\n**Situation 1 — A client asks: "Can the AI remember our whole history?"** You now have a precise answer. Within a single conversation, yes — up to the context window limit. Across separate conversations, no — not without tools like memory features or external databases. Knowing this distinction makes you sound authoritative, not vague.\n\n**Situation 2 — A client wants to analyze a large document.** If a client hands you a 200-page contract or a year's worth of financial statements, you need to know whether the AI can handle it in one shot. With Claude's 200K window, most business documents fit entirely. With a smaller model, you would need to break it into chunks — a workflow design decision that is your job as a consultant.\n\n**Situation 3 — You are building a workflow and cost matters.** Every token costs money when using AI via API. A poorly designed prompt that is 3,000 tokens when it could be 800 tokens is wasting a client's budget. Token awareness helps you build leaner, smarter systems.\n\n## Practical Exercise\n\nOpen Claude.ai and start a new conversation. Paste in a long document — a news article, a contract, anything over 2,000 words. Ask Claude to summarize it, then ask a follow-up question about a specific detail from the middle of the document. Notice that Claude answers accurately, because the full document is still "on its desk." That is the context window doing its job.\n\n**Your tool right now:** Use **Claude Sonnet** for this exercise and for all your learning sessions. It has the full 200K context window and is the right balance of intelligence and speed for your current phase.`,
        quiz: [
          { q: "What is a token in AI terms?", opts: ["A full sentence","Roughly ¾ of a word — the basic unit AI reads and writes","A single character","A paragraph of text"], a: 1 },
          { q: "What does a '200K context window' mean?", opts: ["The AI costs $200K to run","The model can process 200K images","The model can hold roughly 200,000 tokens in its working memory at once","The model was trained on 200K documents"], a: 2 },

      {
        id: "1.2", title: "Model Providers & When to Use Each",
        summary: `## The Landscape You Need to Understand\n\nThere are dozens of AI companies now, but three dominate the business conversation you will be having with clients. As a consultant, your job is not to pick a favorite and defend it religiously — your job is to know each one well enough to match the right tool to the right client situation. Think of yourself as a general contractor: you do not use a hammer for everything just because you are good with it.\n\nLet's go deep on each one.\n\n---\n\n## Anthropic / Claude\n\n**The Company Background:** Anthropic was founded in 2021 by Dario Amodei, Daniela Amodei, and a group of researchers who previously worked at OpenAI. They left specifically because they wanted to build AI with safety as the foundational principle — not as a feature added later. This is not marketing language. It is baked into how Claude is trained, using a method called Constitutional AI, which gives the model a set of guiding principles it reasons against before responding.\n\n**The Model Lineup:**\n- **Claude Haiku** — Lightweight and fast. Use it for simple, high-volume, repetitive tasks: categorizing emails, quick summaries, straightforward Q&A. It is cheap to run.\n- **Claude Sonnet** — The workhorse. This is what you are using right now. Excellent balance of intelligence, speed, and cost. Handles complex writing, nuanced analysis, research tasks, and long documents beautifully.\n- **Claude Opus** — The deep thinker. Slower and more expensive than Sonnet, but measurably better at multi-step reasoning, strategic thinking, and high-stakes tasks where being wrong has real consequences.\n\n**What genuinely differentiates Claude:**\n- **Context window leadership** — Claude's 200K token window consistently leads the mainstream market. For business use cases involving long documents, this is a decisive advantage.\n- **Instruction following** — Claude is exceptionally good at following complex, multi-part instructions. When you build a system prompt with many specific rules, Claude respects them more consistently than most competitors.\n- **Tone and nuance** — Claude writes in a more natural, considered voice. For HNW clients who are sophisticated readers, the quality of output matters. Claude rarely produces corporate boilerplate unless you ask for it.\n- **Privacy positioning** — Anthropic has been careful and conservative about data handling. For clients handling sensitive financial, legal, or personal information, this reputation matters.\n\n**The honest weaknesses:** Claude has no persistent memory across separate conversations by default. It has a smaller third-party tool ecosystem than OpenAI. It can occasionally be overly cautious, declining requests that are perfectly reasonable.\n\n**Best client fit:** Clients who need sophisticated long-form writing, complex document analysis, sensitive data handling, or custom AI assistants built with precise behavioral rules.\n\n---\n\n## OpenAI / ChatGPT\n\n**The Company Background:** OpenAI launched ChatGPT in November 2022 and created the public AI moment we are all living inside. They are the household name. If your client has "tried AI," they have almost certainly used ChatGPT. OpenAI has a complicated structure — it started as a nonprofit, evolved into a capped-profit company, and has Microsoft as a major investor. That Microsoft relationship is strategically enormous: GPT models are now woven into Microsoft Copilot, Word, Excel, Teams, and Azure.\n\n**The Model Lineup:**\n- **GPT-4o** — Their current flagship for most users. Fast, multimodal (handles text, images, and audio together), and well-rounded for general use.\n- **GPT-4o mini** — Their lightweight, cost-efficient option. Similar role to Claude Haiku.\n- **o1 / o3 models** — OpenAI's dedicated reasoning models. Designed for complex logical problems, math, and coding. They think more slowly and deliberately, essentially showing their work step by step before answering.\n\n**What genuinely differentiates OpenAI:**\n- **Ecosystem size** — This is OpenAI's biggest single advantage. The ChatGPT plugin marketplace and GPT Store ecosystem is enormous. Thousands of pre-built integrations, custom GPTs, and business tools are built on top of it.\n- **Brand recognition** — When you walk into a client meeting, you do not need to explain what ChatGPT is. That removes a major trust and education barrier. You can position yourself as the expert who helps them use it properly, rather than convincing them AI is worth exploring at all.\n- **Microsoft integration** — If your client's business runs on Microsoft 365, GPT is already embedded in their tools. Copilot in Word, Excel, and Outlook is GPT under the hood. This is a massive distribution advantage.\n- **Voice interaction** — GPT-4o handles voice natively and fluidly. For clients who want to speak to their AI assistant rather than type, this is polished and practical.\n- **Image generation** — DALL-E is built directly into ChatGPT. For clients who need quick visuals, mockups, or creative assets alongside their text work, this is convenient.\n\n**The honest weaknesses:** OpenAI has had more public controversy around data privacy, organizational instability, and the tension between its commercial interests and its original mission. For privacy-conscious HNW clients, this is worth acknowledging. Context windows are also smaller than Claude's.\n\n**Best client fit:** Clients already in the Microsoft ecosystem, clients who want voice interaction, clients who need the broadest possible tool integrations, or situations where "they have already heard of it" lowers the trust barrier.\n\n---\n\n## Google / Gemini\n\n**The Company Background:** Google was technically ahead of OpenAI in AI research for years — they invented the Transformer architecture that every modern AI model is built on. But they moved cautiously to productize it, partly out of fear of disrupting their core search revenue. ChatGPT's explosion in late 2022 forced their hand. They launched Bard (since rebranded as Gemini) and have been playing aggressive, well-funded catch-up. Google DeepMind — their research arm — is genuinely world-class.\n\n**The Model Lineup:**\n- **Gemini 1.5 Pro** — Their flagship. Features a 1,000,000 token context window — the largest available anywhere. Can process entire codebases, hours of video transcripts, or enormous document archives in one session.\n- **Gemini 1.5 Flash** — Their fast, efficient option for high-volume tasks.\n- **Gemini Advanced** — The consumer-facing premium tier, comparable to ChatGPT Plus or Claude Pro.\n\n**What genuinely differentiates Gemini:**\n- **Google Workspace integration** — This is Gemini's killer feature for small businesses. Gemini is deeply embedded in Gmail, Google Docs, Google Sheets, Google Drive, and Google Meet. It can draft emails in your voice, summarize documents across your entire Drive, and pull context from across your Google account. No other provider has this depth of native integration.\n- **Real-time search grounding** — Gemini connects directly to Google Search. This gives it access to current web information in a way that feels seamless. For clients who need up-to-date market data, news, or recent events, this is genuinely useful.\n- **Multimodal from the ground up** — Unlike competitors who retrofitted image and audio capabilities, Gemini was architected multimodal from the beginning. It handles text, images, audio, video, and code natively.\n- **The context window** — 1 million tokens is extraordinary and unprecedented at scale. If you ever need to analyze an entire company's document archive, a full year of meeting transcripts, or a massive legal case file, Gemini 1.5 Pro is currently the only model that can hold all of it at once.\n\n**The honest weaknesses:** Gemini had inconsistent quality in its early releases with well-publicized errors. Google carries significant user skepticism around data privacy — people worry about their information being used for advertising or model training. For privacy-sensitive HNW clients, this perception challenge is real even if the contractual reality is more nuanced. The interface has also felt less refined than Claude or ChatGPT in early versions.\n\n**Best client fit:** Clients running their business on Google Workspace, clients who need real-time web information baked into responses, or situations requiring extremely long document analysis.\n\n---\n\n## The Consultant's Decision Framework\n\nWhen a client asks "which AI should I use?" — resist the urge to default to whichever one you are most familiar with. Instead, ask three questions:\n\n**1. What ecosystem do they live in?** Microsoft 365 → lean toward OpenAI. Google Workspace → lean toward Gemini. No strong ecosystem lock-in → lean toward Claude.\n\n**2. What is the primary use case?** Long document analysis, sensitive data, nuanced writing → Claude. Broad integrations, voice, existing familiarity → OpenAI. Real-time information, cross-Drive search → Gemini.\n\n**3. How privacy-sensitive is the client?** The more sensitive, the more you lean toward Anthropic or a private deployment.\n\nA consultant who can walk through this reasoning with a client — calmly, clearly, without defaulting to "just use ChatGPT" — is worth paying for. That is what you are building toward.\n\n**Your tool right now:** You are using Claude Sonnet, which is exactly right for this phase. As a secondary exercise: give the same detailed prompt to both Claude and ChatGPT free tiers and compare the outputs. Notice tone, length, structure, and where each one excels or falls flat.`,
        quiz: [
          { q: "Which AI provider is best known for safety-first design and long context windows?", opts: ["OpenAI — the household name","Google — they invented the Transformer","Anthropic / Claude — founded specifically around safety as a core principle","Meta — they open-source their models"], a: 2 },
          { q: "A client's entire business runs on Gmail, Google Docs, and Google Drive. Which provider deserves the first recommendation?", opts: ["OpenAI — it's the most popular and they've heard of it","Anthropic — always the safest choice for any client","Google Gemini — its deep Workspace integration is a decisive advantage here","It genuinely doesn't matter, they perform identically"], a: 2 },
          { q: "What is OpenAI's single biggest competitive advantage over Claude and Gemini?", opts: ["The largest context window in the industry","Its ecosystem size — thousands of integrations, plugins, and Microsoft 365 embedding","The best privacy and data handling reputation","The lowest cost per token"], a: 1 },
          { q: "What makes Google Gemini's context window extraordinary compared to competitors?", opts: ["It is 200K tokens, same as Claude","It is 1 million tokens — large enough to process entire document archives in one session","It has no context window limit at all","Context windows are the same across all providers"], a: 1 },
          { q: "A privacy-conscious HNW client with sensitive financial data asks which AI to use. What is your best starting recommendation?", opts: ["ChatGPT — they have probably already heard of it","Google Gemini — it has real-time search","Anthropic / Claude — Anthropic's conservative data handling and safety-first reputation makes it the strongest starting point","It doesn't matter — all providers have identical privacy policies"], a: 2 },

      {
        id: "1.3", title: "Temperature & Randomness",
        summary: `## What Is Temperature?\n\nTemperature is one of the most important settings in AI — and one that most people never think about because they do not know it exists. It is a numerical dial that controls how **creative versus predictable** an AI's output will be.\n\nThe scale typically runs from **0 to 1** (sometimes 0 to 2 depending on the platform). That is it. One number. But the effect it has on output is dramatic.\n\nHere is the core idea: when an AI generates text, it is constantly making probability decisions. Given everything that has come before, what word should come next? At any given moment, the model has a ranked list of possible next words with probabilities attached — "the" might be 40% likely, "a" might be 25% likely, "our" might be 15% likely, and so on.\n\n**Temperature determines how strictly the model follows that probability ranking.**\n\n---\n\n## Low Temperature (0.0 – 0.3): The Accountant\n\nAt low temperature, the model almost always picks the highest-probability word. It plays it safe. It takes the most expected path through language at every step.\n\nThe result: outputs that are **consistent, predictable, factual, and stable.** Ask the same question three times and you will get nearly identical answers. There are no surprises, no flights of fancy, no unexpected word choices.\n\nThe analogy: imagine asking a seasoned accountant "what is two plus two?" You want the answer to be 4 every single time. No creativity. No interpretation. Just the right answer, reliably.\n\n**Use low temperature when:** accuracy and consistency are paramount — legal documents, financial summaries, data extraction, compliance-related content, anything where being wrong has consequences.\n\n---\n\n## High Temperature (0.7 – 1.0): The Jazz Musician\n\nAt high temperature, the model stops following the safest path. It introduces randomness — sometimes picking lower-probability words that are more unusual, more surprising, more creative.\n\nThe result: outputs that are **varied, inventive, unexpected, and sometimes brilliant — and occasionally a little off.** Ask the same question three times and you will get three genuinely different answers. The model takes risks with language.\n\nThe analogy: imagine asking a jazz musician to improvise on a theme. You gave them a starting point, but they are going somewhere unexpected with it, making choices no sheet music would prescribe. Sometimes the result is stunning. Occasionally it wanders.\n\n**Use high temperature when:** creativity and variety are the goal — brainstorming sessions, tagline generation, story ideas, exploring multiple angles on a problem, any situation where you want options rather than a single "correct" answer.\n\n---\n\n## The Middle Ground (0.4 – 0.6): The Manager\n\nMost general business tasks live in the middle range. Thoughtful, reasonably consistent, with enough flexibility to produce interesting outputs — but not so random that quality suffers. This is where Claude operates by default for most tasks.\n\n---\n\n## Why This Matters for Your Consulting Business\n\nWhen you build custom AI tools for clients, you will often have the ability to set temperature via configuration or API settings. Understanding this dial lets you build smarter tools:\n\n**A legal contract review assistant?** Low temperature. Your client needs consistent, reliable extraction of terms and flags — not creative interpretations.\n\n**A brainstorming partner for a client's marketing team?** High temperature. They want 20 unexpected campaign ideas, not the same safe suggestion every time.\n\n**A client email drafting tool?** Middle ground. Professional and consistent, but with enough variation that emails do not sound robotic.\n\nKnowing when to turn this dial — and why — separates a consultant who slaps together a basic ChatGPT wrapper from one who designs tools that actually fit the client's needs.\n\n---\n\n## How to Control Temperature Without Technical Settings\n\nYou cannot directly set a temperature number in Claude's standard chat interface — that requires API access, which comes later. But you can achieve the same effect through your prompting language right now.\n\n**Simulating low temperature:** "Give me the single most accurate and conventional answer. Be precise and consistent. Do not offer alternatives or speculation."\n\n**Simulating high temperature:** "Give me five completely different and unexpected approaches to this. Push beyond the obvious. I want creative variety, not the safe answer."\n\n**This is manual temperature control through language — and it works.** Practice this by giving Claude the same prompt twice: once with low-temperature language and once with high. Watch how different the outputs are.\n\n**Your tool right now:** Use **Claude Sonnet** for this exercise. Give it a simple task — "suggest a tagline for a luxury wealth management firm" — three times. First with "be conventional and safe," then with "be creative and unexpected," then with no instruction at all. Compare the three outputs and you will immediately feel the difference temperature makes.`,
        quiz: [
          { q: "What does temperature fundamentally control in an AI model?", opts: ["How fast the model generates responses","How creative versus predictable the output will be","How long the responses are","How many languages the model can use"], a: 1 },
          { q: "You are building an AI tool to extract key terms from legal contracts for a law firm client. What temperature approach is most appropriate?", opts: ["High — legal work requires creative interpretation","Low — consistency and accuracy are critical, never creative surprises","Medium — always default to the middle","Temperature has no effect on document analysis tasks"], a: 1 },
          { q: "Using the jazz musician analogy, what does high temperature produce?", opts: ["Sheet music followed note-for-note — perfectly accurate, no deviation","Improvisation — unexpected, varied, creative, occasionally off but often brilliant","Playing in unison with other musicians — consistent group performance","Complete silence — the model refuses to respond"], a: 1 },
          { q: "How can you simulate low temperature in Claude's standard chat interface without API access?", opts: ["You cannot — temperature requires API access to control at all","By making your prompts shorter","By using language like 'give me the single most accurate and conventional answer, do not offer alternatives'","By switching to Claude Haiku instead of Sonnet"], a: 2 },
          { q: "A client's marketing team wants an AI brainstorming partner that generates 20 unexpected campaign angles. What temperature philosophy fits?", opts: ["Low — brainstorming needs to be accurate and reliable","High — you want creative variety, unexpected ideas, and multiple different angles","Zero — maximum predictability produces the best ideas","Temperature does not apply to creative tasks, only analytical ones"], a: 1 },
        ]

      {
        id: "1.4", title: "Parameters & Model Sizes",
        summary: `## What Are Parameters?\n\nWhen people talk about AI model sizes — "a 7B model," "a 70B model," "a 405B model" — the number refers to **parameters.** Understanding what parameters are, and why size matters, is essential vocabulary for any AI consultant.\n\nA **parameter** is a numerical value inside the AI model — a weight, essentially — that was learned and refined during the training process. Think of parameters as the compressed, encoded form of everything the model has learned. During training, the model processed enormous amounts of text and adjusted these internal numbers billions of times until the outputs became good.\n\nThe analogy: parameters are like the total accumulated experience and knowledge stored in a person's brain after years of education and work. You cannot see the individual memories, but they shape every decision the person makes. More training on more data, refined over more time = better parameters = better outputs.\n\n**More parameters generally means a more capable model** — better reasoning, better nuance, better handling of complex or ambiguous situations. But it is not a simple linear relationship. A well-trained 13B model can outperform a poorly trained 70B model on specific tasks. Architecture and training quality matter enormously too.\n\n---\n\n## The Size Tiers — The Staffing Analogy\n\nHere is a practical framework for understanding model sizes:\n\n**Small models (1B – 13B parameters) — The Sharp Intern**\nFast. Cheap. Can run on modest hardware. Excellent at narrow, focused, repetitive tasks: categorizing data, answering simple questions, filling out structured templates, basic summarization. Gets confused by complexity, nuance, or tasks that require holding many competing ideas at once. Not great for strategy, but brilliant for execution of simple tasks at scale.\n\n**Mid-size models (13B – 34B parameters) — The Competent Manager**\nSignificantly more capable than small models. Can handle multi-step reasoning, moderate writing complexity, and most standard business tasks. A real sweet spot for cost-to-performance on a local workstation. These run well on a GPU with 24GB of VRAM — which is exactly the hardware tier you will eventually buy.\n\n**Large models (70B+ parameters) — The Senior VP**\nSlow, resource-hungry, expensive — but dramatically more capable at nuanced reasoning, creative tasks, complex analysis, and situations requiring judgment. Claude Sonnet and GPT-4o operate at roughly this tier in terms of capability (though cloud models do not always publish exact parameter counts).\n\n**Frontier models (100B–1T+ parameters) — The Executive Consultant**\nThe cutting edge. Models like Claude Opus, GPT-4, and Gemini Ultra operate here. These require massive cloud infrastructure to run. You will never run one locally — you access them via API or web interface. Reserved for your most complex, highest-stakes tasks.\n\n---\n\n## Why This Matters for Your Local Workstation\n\nThis is where the rubber meets the road for your $3,000–$4,000 hardware investment coming in Phase 2.\n\nThe key constraint is **VRAM** — the memory on your graphics card (GPU). Running an AI model locally requires loading the entire model into VRAM. If the model does not fit, it cannot run — or it runs painfully slowly by spilling into regular RAM.\n\nHere is the rough math:\n- A **7B model** at standard precision needs roughly **8GB of VRAM** to run comfortably\n- A **13B model** needs roughly **16GB of VRAM**\n- A **34B model** needs roughly **24GB of VRAM** — exactly what an RTX 3090 or RTX 4090 offers\n- A **70B model** needs roughly **48GB of VRAM** — requires two high-end GPUs\n\nThis is why we are targeting a GPU with 24GB VRAM (like a used RTX 3090 or RTX 4090) for your workstation. It is the sweet spot: enough VRAM to run the most capable models that are still practical for solo use, without requiring enterprise-grade hardware.\n\n**VRAM is like desk space.** A small desk (8GB) can only spread out small models. A large desk (24GB) can spread out a much bigger, more capable model and still have room to work.\n\n---\n\n## How This Maps to Claude's Lineup\n\nAnthropicnot does not publicly disclose exact parameter counts for Claude models, but based on behavior and capability benchmarks, the practical mapping is:\n\n- **Claude Haiku** — Behaves like a fast, focused small model. Use it for high-volume simple tasks.\n- **Claude Sonnet** — Behaves like a well-trained large model. Your everyday workhorse.\n- **Claude Opus** — Behaves like a frontier model. Use it when depth of reasoning genuinely matters — complex strategy, high-stakes analysis, nuanced judgment calls.\n\nThe rule: **match model capability to task complexity.** Using Opus to summarize a one-paragraph email is like hiring a senior executive to file paperwork. It works, but it is wasteful. Using Haiku to draft a nuanced strategic memo is like sending the intern to negotiate a deal. It might technically produce output, but the quality will disappoint.\n\n**Your tool right now:** You are on Claude Sonnet via the cloud — ideal for this learning phase. No hardware decisions needed yet. But when you hear the terms "7B," "13B," or "VRAM" in client conversations or industry content, you now have a clear mental model for what they mean and why they matter.`,
        quiz: [
          { q: "What are parameters in an AI model?", opts: ["The on/off settings visible in the chat interface","Numerical values learned during training that encode the model's knowledge and capabilities","The number of languages the model has been trained on","The speed benchmarks published by the AI company"], a: 1 },
          { q: "Using the staffing analogy, what type of task is a 7B 'Sharp Intern' model best suited for?", opts: ["Complex multi-step strategic analysis requiring nuanced judgment","Narrow, focused, repetitive tasks like categorizing data or answering simple structured questions","Writing long-form persuasive content for HNW clients","Tasks requiring the model to hold many competing ideas simultaneously"], a: 1 },
          { q: "Why is a GPU with 24GB VRAM the target spec for your future local workstation?", opts: ["24GB is the minimum to run any AI model at all","It matches the VRAM needed to run capable 34B models — the sweet spot for solo professional use","VRAM has no relationship to which models you can run","More VRAM means faster internet connection to cloud models"], a: 1 },
          { q: "Which Claude model should you use for a high-stakes strategic analysis where nuanced judgment is critical?", opts: ["Claude Haiku — fastest response time","Claude Sonnet — always the right default","Claude Opus — frontier-level reasoning for when depth genuinely matters","All Claude models perform identically on reasoning tasks"], a: 2 },
          { q: "A client wants to automate categorization of 10,000 customer support emails daily. What model tier is most appropriate?", opts: ["Frontier model — this is too important to risk with a smaller model","A small, fast, cheap model — the task is narrow, repetitive, and does not require deep reasoning","Only cloud models can handle this volume of work","Model size is irrelevant for categorization tasks"], a: 1 },
        ]
      },
      {
        id: "1.5", title: "System Prompts vs. User Prompts",
        summary: `## The Two Layers of Every AI Conversation\n\nEvery interaction with an AI model — whether you are typing in Claude.ai, using a custom business tool, or building something for a client — operates on two distinct layers of instruction. Understanding the difference between these two layers is not just conceptual knowledge. It is the foundation of your consulting product.\n\nThe two layers are: **the system prompt** and **the user prompt.**\n\n---\n\n## The System Prompt: Backstage Instructions\n\nThe system prompt is a set of instructions that is written once, loaded before the conversation begins, and typically invisible to the end user. It defines who the AI is, what it can and cannot do, what tone it should use, what topics are off-limits, and what context it should always keep in mind.\n\nThink of it as the **employee handbook and briefing you give a new hire before their very first client call.** You do not explain all of this on the call itself — that would be strange and inefficient. You pull the employee aside beforehand: "Here is who our clients are. Here is how we communicate. Here is what you never say. Here is the context you need. Now go take the call."\n\nThe system prompt does the same thing for AI. The client or end user then interacts with an AI that already has all of this context loaded — and they see only the polished output, not the instructions behind it.\n\n**A real example system prompt for a HNW client assistant:**\n\n"You are a professional concierge assistant for [Client Name], a high-net-worth individual. Always address the user formally. Be concise and never use filler language. You have expertise in luxury travel, private banking concepts, estate planning vocabulary, and discretionary portfolio management terminology. Never give specific investment or legal advice. Always recommend that the user consult their licensed advisor for any specific decisions. Do not discuss competitors or other financial services. Maintain absolute confidentiality and never reference previous conversations."\n\nWith that system prompt in place, every conversation the client has with this AI starts from the right foundation — without them needing to explain any of it themselves.\n\n---\n\n## The User Prompt: The Live Conversation\n\nThe user prompt is simply what the person types in the conversation itself. It is the live, real-time input. It can be a question, a command, a document to analyze, a draft to improve — anything the user needs in that moment.\n\nUsing our earlier example: after the system prompt has established the context, the user might type "What should I know about tax-loss harvesting before my meeting with my advisor this week?" That is a user prompt. It is working within the frame that the system prompt already established.\n\nThe AI's response draws on both layers simultaneously: the standing instructions from the system prompt and the immediate request from the user prompt. The user only sees the latter — they experience a seamless, knowledgeable assistant. The craft is invisible.\n\n---\n\n## Why System Prompts Are Your Consulting Product\n\nThis is the most important business insight in this entire lesson, so read it carefully.\n\nWhen most people use AI, they just type into the chat box. They see a generic tool that gives generic answers. They do not realize the tool can be configured. They do not know what a system prompt is. They have no idea that you can give the AI a persistent identity, a set of behavioral rules, a client-specific knowledge base, and a defined scope of capability.\n\n**That gap between what most people know and what you now know is where your consulting value lives.**\n\nWhen you build a custom AI assistant for a client — a personal concierge, a business research tool, a client communication helper, a document review system — the system prompt is the intellectual property you are creating. It is your design work. It is the difference between a generic AI and a specialized tool that feels like it was built for that specific person or business.\n\nA well-crafted system prompt can take 30 minutes to build and deliver ongoing value for months. Clients cannot easily replicate it without knowing what they are doing. That is a defensible consulting asset.\n\n---\n\n## Where to Write System Prompts Right Now\n\nIn **Claude Projects**, the "Project Instructions" field is your system prompt. Everything you write there applies to every conversation inside that Project. This is exactly how this learning program is set up — the AI Foundation Architect persona, your background, your goals, your hardware constraints — all of that lives in the Project Instructions for this conversation.\n\nYou have been benefiting from a system prompt this entire time. Now you know what it is.\n\n**Your tool right now:** Open Claude.ai and create a new Project. In the Project Instructions, write a simple system prompt: "You are a professional business writing assistant. Always be concise. Use formal but warm language. Never use bullet points — always write in prose." Then start a conversation inside that Project and notice how the AI behaves differently than it does in a standard chat. You just built your first product.`,
        quiz: [
          { q: "What is a system prompt?", opts: ["The first message a user sends at the start of every conversation","Backstage instructions set before the conversation begins that define the AI's persona, rules, and context — typically invisible to the end user","A technical error message that appears when the AI cannot answer","The AI's final response at the end of a completed conversation"], a: 1 },
          { q: "Using the employee analogy, a system prompt is most accurately compared to:", opts: ["A customer's complaint that the employee must respond to","A casual lunch conversation between colleagues about weekend plans","The employee handbook and pre-call briefing given before the employee's first client interaction","A performance review conducted after the work is complete"], a: 2 },
          { q: "Why is a well-crafted system prompt considered a consulting product and intellectual property?", opts: ["Because system prompts are legally patented by consultants","Because it transforms a generic AI into a specialized, customized tool that delivers specific value — and most clients cannot build it without expertise","Because system prompts are stored in the cloud and have monetary value attached","Because AI companies pay consultants to write system prompts for them"], a: 1 },
          { q: "In Claude Projects, where specifically do you write your system prompt?", opts: ["In the main chat message box at the start of every new conversation","In the Project Instructions field — which applies to all conversations within that Project","In your account billing and subscription settings","Claude Projects does not support system prompts — they require API access"], a: 1 },
          { q: "A client types 'Can you summarize the key risks in this contract?' into a chat window. What layer of AI interaction is this?", opts: ["A system prompt — it is setting context for the conversation","A temperature setting being adjusted mid-conversation","A user prompt — it is the live, real-time request within an established conversation","A model parameter being configured by the user"], a: 2 },
        ]

      {
        id: "1.6", title: "Few-Shot Prompting",
        summary: `## What Is Few-Shot Prompting?\n\nFew-shot prompting is one of the most powerful and underused techniques in practical AI work — and almost no casual AI user knows it exists. Mastering it is a genuine differentiator that you can charge for.\n\nHere is the core idea: instead of just describing what you want the AI to do, you **show it** by providing 2 to 5 completed examples before making your actual request. The AI reads your examples, infers the pattern, and applies that pattern to the new task.\n\nThe term breaks down simply:\n- **Zero-shot** = no examples, just a description of the task\n- **One-shot** = one example before the task\n- **Few-shot** = two to five examples before the task\n- **Many-shot** = five or more examples (less common in practice)\n\n---\n\n## Zero-Shot vs. Few-Shot: A Real Comparison\n\nLet's use a concrete example. You want Claude to write short, punchy LinkedIn posts for a client in the financial advisory space.\n\n**Zero-shot approach:**\n"Write a LinkedIn post about the importance of estate planning for high-net-worth individuals. Keep it concise and professional."\n\nResult: Claude produces something competent but generic. It follows the general instruction but has no feel for your client's specific voice, tone, sentence length, level of formality, or what "punchy" means to them.\n\n**Few-shot approach:**\n"Here are three LinkedIn posts written by my client that he loves:\n\nExample 1: 'Most people wait until something goes wrong to think about estate planning. By then, half the options are gone. Schedule the conversation while you still have all of them.'\n\nExample 2: 'I have sat across the table from more families dealing with an unexpected estate than I can count. The ones who planned sleep better. The ones who did not, wish they had.'\n\nExample 3: 'Wealth without a plan is just deferred complexity for your family. Do the work now.'\n\nNow write a new LinkedIn post about the value of annual portfolio reviews. Match the voice, length, and tone of the examples above exactly."\n\nResult: Claude now has a clear template for voice, sentence rhythm, emotional register, and length. The output will sound like your client — not like generic AI content.\n\nThis is the power of few-shot prompting: **you are not describing the target, you are demonstrating it.**\n\n---\n\n## The Employee Training Analogy\n\nImagine you hire a talented new employee to handle client communications. You could:\n\n**Option A (Zero-shot):** Hand them a written job description that says "write professional, concise, warm emails to clients." Then send them off.\n\n**Option B (Few-shot):** Spend 20 minutes showing them three emails that previous employees wrote that were perfect. Say: "This is the tone, this is the length, this is what 'warm but professional' actually looks like here. Now you try."\n\nOption B wins every single time. Not because Option A is wrong — it is fine — but because examples are more information-rich than descriptions. The AI learns more from seeing three examples than from reading a paragraph of adjectives.\n\n---\n\n## Why This Is a Premium Consulting Skill\n\nHere is the business reality: most people who use AI just type a request and accept whatever comes back. They might refine it once or twice. They have no systematic approach to capturing and replicating style, voice, or format.\n\nFew-shot prompting is how you do the following things professionally:\n\n**Capture a client's voice.** Every HNW individual and every business has a communication style. Some are formal and measured. Some are direct and casual. Some use specific vocabulary or avoid certain phrases. Few-shot prompting lets you encode that voice into your prompts so the AI replicates it consistently across all outputs.\n\n**Build consistent branded content.** Once you have a few-shot prompt that captures a client's style, you can generate on-brand content at scale — emails, summaries, reports, social posts — that all sound like they came from the same person.\n\n**Create reusable templates.** A few-shot prompt built around a client's style is a reusable asset. You write it once, refine it over time, and it keeps delivering value. This is the kind of work that justifies a retainer arrangement.\n\n---\n\n## Building Your First Few-Shot Prompt\n\nThe formula is simple:\n\n1. Collect 2–5 examples of output the client loves — emails they have sent, documents they have written, posts they have published\n2. Paste those examples into your prompt with clear labels ("Example 1:", "Example 2:", etc.)\n3. After the examples, write: "Now [do the task]. Match the voice, tone, and style of the examples above exactly."\n4. Review the output and adjust the examples if needed — sometimes swapping one example for a better one dramatically improves results\n\nPro tip: **the quality of your examples matters more than the quantity.** Three excellent, representative examples outperform five mediocre ones every time.\n\n---\n\n## How Few-Shot Connects to System Prompts\n\nYou can embed few-shot examples directly into a system prompt. This means every conversation within a Claude Project can automatically produce outputs that match a specific style — without you needing to paste examples every time. This is how you build sophisticated, personalized AI tools for clients.\n\nSystem prompt + few-shot examples = a customized AI assistant that writes in your client's voice on demand. That is a product worth paying for.\n\n**Your tool right now:** Use **Claude Sonnet**. Find 2–3 emails or pieces of writing you personally like — from anyone. Paste them into Claude as few-shot examples and ask Claude to write something new in that style. Compare it to simply describing the style in words. The difference will immediately show you why this technique matters.`,
        quiz: [
          { q: "What is the core mechanic of few-shot prompting?", opts: ["Using a smaller, faster model to handle repetitive tasks","Providing 2–5 completed examples before your actual request so the AI learns by demonstration rather than description","Sending multiple separate prompts for the same task to compare outputs","Breaking a complex task into fewer individual steps"], a: 1 },
          { q: "In the LinkedIn post example, what specifically does few-shot prompting capture that zero-shot cannot?", opts: ["The exact factual accuracy of the content produced","The client's specific voice, sentence rhythm, emotional register, and stylistic preferences","The speed at which the AI generates the response","The length of the final output in word count"], a: 1 },
          { q: "Using the employee training analogy, few-shot prompting is equivalent to:", opts: ["Handing a new hire a written job description and sending them directly to their first client call","Spending 20 minutes showing a new hire three examples of perfect past work and saying 'do it like this'","Enrolling an employee in a six-month formal training program","Allowing an employee to figure out the right approach entirely on their own over time"], a: 1 },
          { q: "When building a few-shot prompt, what matters more than the number of examples?", opts: ["Having at least ten examples to ensure the AI has enough data","The quality and representativeness of the examples — three excellent ones outperform five mediocre ones","The examples must all be from the same document or source","Examples should always be written by the AI first, then refined by you"], a: 1 },
          { q: "How can few-shot examples be made permanent so they apply to every conversation automatically?", opts: ["By saving them in a separate text file on your computer","By embedding them directly into the system prompt inside a Claude Project","By typing them into every new conversation manually each time","Few-shot examples cannot be made permanent — they must always be re-entered"], a: 1 },
        ]

        id: "1.7", title: "Week 1 Review — Build Your AI Glossary",
        summary: `## What This Session Is For\n\nYou have now covered six foundational concepts that form the bedrock of intelligent AI conversation — with clients, with colleagues, and in your own work. This final session of Chapter 1 is not a new lesson. It is a **consolidation and creation exercise** — and it produces your first real consulting asset.\n\nThe deliverable: your personal **AI Glossary** — a living document that you will refine over the coming months and eventually use with clients.\n\n---\n\n## Why a Glossary Is a Business Asset\n\nHere is a situation that will happen to you within the first six months of consulting work. You are in a discovery call with a prospective HNW client. The conversation is going well. Then they say something like: "I keep hearing about context windows — our current vendor mentioned ours is maxing out. What should we do?"\n\nYou have two paths:\n\n**Path A:** You vaguely remember the term but give a fuzzy, hedged answer. The client notices. Their confidence in you drops slightly. You do not close the engagement.\n\n**Path B:** You say, with calm confidence: "A context window is the total amount of information the AI can hold in working memory during a session — think of it as a desk. When it fills up, the oldest content gets pushed off. The fix is either a model with a larger window, or we restructure your workflow to manage what stays in context. Let me walk you through both options." The client nods. You close the engagement.\n\nThe only difference between Path A and Path B is preparation. The glossary is that preparation.\n\n---\n\n## The Six Terms to Define\n\nFor each of the following terms, you are going to write two things:\n\n**A:** One sentence that defines the term in plain English — no jargon, no hedging, as if you are explaining it to a smart non-technical friend.\n\n**B:** One sentence on why a client should care — the business relevance, stated from their perspective.\n\nHere are your six terms:\n\n**1. Token & Context Window**\nHint: Start with the desk analogy. Make it concrete — give an example of a real document length that fits or does not fit.\n\n**2. AI Model Providers**\nHint: Use the law firm analogy. Name the three players and give each one a one-word specialty.\n\n**3. Temperature**\nHint: Lead with the accountant vs. jazz musician contrast. Make it immediately intuitive.\n\n**4. Parameters & Model Sizes**\nHint: Use the staffing analogy. Connect it to the VRAM desk metaphor so it links to hardware concepts.\n\n**5. System Prompt vs. User Prompt**\nHint: The employee handbook framing works perfectly here. Emphasize that the system prompt is your product.\n\n**6. Few-Shot Prompting**\nHint: Lead with the business value — voice capture, brand consistency — before explaining the mechanics.\n\n---\n\n## The Rules of the Glossary\n\nThree non-negotiable rules that will make this document genuinely useful:\n\n**Rule 1: No jargon.** If a word requires another technical definition to understand, replace it. Your test: would a successful 60-year-old executive who has never used AI understand this sentence immediately?\n\n**Rule 2: Client relevance in every entry.** Definitions without business context are encyclopedia entries. You are building a consulting tool, not an encyclopedia. Every entry must answer "so what?" from the client's perspective.\n\n**Rule 3: Write in your voice.** Do not copy the analogies from these lessons verbatim. Rework them. Add your own examples. The glossary should sound like you — because in a client conversation, it will be coming out of your mouth.\n\n---\n\n## How to Use Claude to Pressure-Test Your Definitions\n\nOnce you have written a draft definition for each term, open Claude Sonnet and use this prompt:\n\n"I am an AI consultant preparing to explain this concept to a high-net-worth client with no technical background. Here is my current definition: [paste your definition]. Is this explanation clear, accurate, and free of jargon? What would confuse a non-technical person? How would you improve it?"\n\nRefine based on Claude's feedback. Do this for each entry. This process — using AI to improve your own explanations of AI — is also a great early example of AI augmenting your work, which you will eventually describe to clients.\n\n---\n\n## What Comes Next\n\nOnce you pass this quiz and earn your Chapter 1 completion, Chapter 2 unlocks: **Prompt Like a Pro.** That chapter takes everything you have learned here and turns it into a hands-on practical skill — building prompts from scratch, writing your first system prompt, and assembling a Prompt Library that becomes your second consulting asset.\n\nThe glossary you build in this session will be a reference you return to throughout the entire 7-month program. Keep it in a Google Doc. Update it as you learn. By Month 6, it will be one of the sharpest documents in your consulting toolkit.\n\n**Your tool right now:** Open a Google Doc titled "AI Consulting Glossary — [Your Name]." Draft all six entries using the framework above. Then use **Claude Sonnet** to pressure-test each one with the prompt provided. Do not rush this — a polished glossary is worth more than a fast one.`,
        quiz: [
          { q: "What is the primary purpose of building a personal AI Glossary at this stage?", opts: ["To demonstrate technical depth to other developers and engineers","To have confident, plain-English definitions immediately available for non-technical client conversations","To memorize as much technical jargon as possible before client meetings","To complete a formal industry certification requirement"], a: 1 },
          { q: "According to the three rules of the glossary, every entry must include what beyond just a definition?", opts: ["A technical citation from an academic paper or official documentation","A client-relevance sentence that answers 'so what?' from the client's business perspective","A list of at least five real-world examples for each concept","A comparison to at least two competing definitions from different sources"], a: 1 },
          { q: "What is the correct way to use Claude to pressure-test your glossary definitions?", opts: ["Ask Claude to rewrite them using more technically precise and accurate language","Paste each definition and ask Claude if it is clear, accurate, and jargon-free for a non-technical HNW client","Ask Claude to make each definition longer and more comprehensive","Use Claude Haiku for speed when reviewing all six entries at once"], a: 1 },
          { q: "Which of these is NOT one of the six core terms covered in Chapter 1?", opts: ["Temperature","Few-Shot Prompting","Blockchain and Decentralized AI","System Prompt vs. User Prompt"], a: 2 },
          { q: "Why should your glossary entries be written in your own voice rather than copied from lesson materials?", opts: ["To avoid plagiarism of copyrighted course content","Because in a client conversation the explanations will come out of your mouth — they need to sound like you, not like a textbook","To ensure the definitions are longer and more detailed than the originals","Your own voice is technically more accurate than lesson materials"], a: 1 },
        ]

      { id:"2.1", title:"The Anatomy of a Power Prompt",
        summary:`## What Makes a Prompt Powerful?\n\nMost people treat AI prompts like Google searches — short, vague, keyword-heavy. "Write a summary." "Give me ideas." "Make this better." Then they are disappointed when the output is generic. The problem is not the AI. The problem is the prompt.\n\nA power prompt is not longer for the sake of length. It is **precise, structured, and information-rich.** It gives the AI everything it needs to produce a great output on the first attempt — reducing the back-and-forth that wastes time and produces mediocre results.\n\nThink of it this way: if you hired a talented freelancer and handed them a one-sentence brief, you would get a one-sentence-quality result. Hand them a detailed brief with context, examples, constraints, and a clear deliverable — you get professional work. AI is the same.\n\n---\n\n## The Six Components of a Power Prompt\n\nEvery strong prompt contains some combination of these six elements. Not every prompt needs all six, but knowing them lets you diagnose why a prompt is underperforming and fix it.\n\n**1. Role**\nTell the AI who it is for this task. This is not just a fun trick — it genuinely shapes the model's perspective, vocabulary, and approach.\n\nWeak: "Write a financial summary."\nStrong: "You are a senior financial analyst with 20 years of experience writing executive briefings for C-suite audiences."\n\n**2. Context**\nGive the AI the background it needs. What is the situation? Who is the audience? What problem are we solving? The AI has no access to your world — you have to bring it in.\n\nWeak: "Write an email to my client."\nStrong: "My client is a 58-year-old wealth management client who missed our last quarterly review. He is analytical, values brevity, and dislikes anything that feels like a sales pitch."\n\n**3. Task**\nBe explicit about exactly what you want. Action verb, deliverable, format. Do not make the AI guess.\n\nWeak: "Do something with this data."\nStrong: "Write a 3-paragraph executive summary of the attached data, leading with the most important trend and ending with a specific recommendation."\n\n**4. Format**\nTell the AI how you want the output structured. Bullet points or prose? How long? Headers or no headers? One option or three? Without format instructions, the AI defaults to its own preference — which may not match yours.\n\nWeak: (no format instruction)\nStrong: "Write this as three short paragraphs. No bullet points. Each paragraph should be under 60 words. Use plain language — no jargon."\n\n**5. Constraints**\nTell the AI what NOT to do. This is underused and extremely powerful. Constraints prevent the AI from defaulting to safe, generic, or inappropriate outputs.\n\nWeak: (no constraints)\nStrong: "Do not use the words 'leverage,' 'synergy,' or 'stakeholder.' Do not open with 'I hope this email finds you well.' Do not offer more than one recommendation."\n\n**6. Examples**\nShow the AI what good looks like. This is few-shot prompting embedded directly in the prompt structure — and it is the fastest way to dramatically improve output quality.\n\nWeak: "Write in a professional tone."\nStrong: "Here is an example of the tone I am looking for: [paste example]. Match this voice exactly."\n\n---\n\n## The Power Prompt Formula\n\nHere is a simple template you can apply to almost any business task:\n\n**[ROLE] + [CONTEXT] + [TASK] + [FORMAT] + [CONSTRAINTS] + [EXAMPLES]**\n\nYou do not need all six every time. A quick internal memo might only need Role + Task + Format. A client-facing deliverable might need all six. The skill is knowing which components the situation requires.\n\n---\n\n## A Real Before and After\n\n**Before (weak prompt):**\n"Write a bio for my LinkedIn."\n\n**After (power prompt):**\n"You are a professional copywriter specializing in personal branding for financial services professionals. I am an independent AI consultant who previously spent 12 years in wealth management. My target audience is high-net-worth individuals and family offices. Write a first-person LinkedIn bio that is 3 short paragraphs, under 150 words total. Lead with what I do for clients, not my career history. Use confident, direct language. Do not use the word 'passionate.' Do not use bullet points."\n\nThe second prompt does not just give the AI more words — it gives it a complete picture of the role, the audience, the deliverable, the format, and the constraints. The output will be dramatically better.\n\n---\n\n## Why This Is a Consulting Skill\n\nHere is the business reality: your clients will struggle to get good AI outputs not because they are using the wrong tool, but because they do not know how to brief it properly. Teaching clients to write power prompts — or building power prompt templates for them — is a concrete, deliverable consulting service.\n\nA library of 20 customized power prompt templates for a specific client's use cases is a real deliverable worth real money. You are building that library starting in lesson 2.7.\n\n**Your tool right now:** Use **Claude Sonnet**. Take a prompt you have used before — any prompt — and rebuild it using all six components. Compare the output to your original. The difference will immediately show you why this framework matters.`,
        quiz:[
          { q:"What is the primary reason most people get mediocre AI outputs?", opts:["The AI models are still too limited to produce quality work","Prompts are too vague and lack the structure and context the AI needs","AI works better for technical tasks than business tasks","The outputs are actually good — people just expect too much"], a:1 },
          { q:"A client wants an AI tool to draft follow-up emails after client meetings. Which prompt component would most directly capture their specific communication style?", opts:["Role — defining the AI as an email writing assistant","Format — specifying the email length and structure","Examples — providing 2-3 actual follow-up emails the client has written and loved","Constraints — listing words the client does not want used"], a:2 },
          { q:"You are building a prompt for a client and the output keeps including corporate buzzwords like 'leverage' and 'synergy' that the client hates. Which component do you add or strengthen?", opts:["Role — the AI needs a stronger persona","Context — the AI needs more background on the client","Constraints — explicitly tell the AI what NOT to do or say","Task — the deliverable description needs to be clearer"], a:2 },
          { q:"Using the freelancer analogy, why does a detailed prompt produce better results than a one-sentence prompt?", opts:["Longer prompts use more tokens which activates more of the model's capability","A detailed brief gives the AI everything it needs to produce professional work — just like a detailed brief does for a human freelancer","The AI charges more attention to longer prompts","One-sentence prompts trigger a safety filter in most AI models"], a:1 },
          { q:"Which combination of prompt components is most critical for a client-facing deliverable like a formal executive report?", opts:["Role and Task only — keep it simple","Task and Format only — the deliverable and structure matter most","All six components — Role, Context, Task, Format, Constraints, and Examples — for maximum quality control","Context and Examples only — background and demonstration are sufficient"], a:2 },
        ]
